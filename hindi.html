<style>
body{margin:0;padding:0;font-family:'Noto Sans Devanagari',Arial,sans-serif;background:#0d2b0d;color:#222;}
*{box-sizing:border-box;}

/* HEADER */
#header{background:#1b4332;padding:14px 12px;text-align:center;border-bottom:4px solid #52b788;}
#header h1{color:#7dc142;font-size:18px;margin:0 0 2px 0;}
#header p{color:#95d5b2;font-size:11px;margin:2px 0;letter-spacing:1px;}
#header h2{color:#fff;font-size:15px;margin:6px 0 2px 0;}
#header small{color:#95d5b2;font-size:11px;}

/* MONTH BUTTONS */
#monthBar{background:#0a1a0a;padding:8px;overflow-x:scroll;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.mBtn{display:inline-block;padding:8px 12px;margin:0 3px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,0.1);color:#95d5b2;font-size:12px;cursor:pointer;font-family:'Noto Sans Devanagari',Arial,sans-serif;}

/* CONTENT */
#main{padding:10px;max-width:680px;margin:0 auto;}

/* HERO */
#heroBox{border-radius:10px;overflow:hidden;margin-bottom:10px;position:relative;background:#1a3a1a;}
#heroBox img{width:100%;height:160px;object-fit:cover;display:block;}
#heroBox .ov{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;}
#heroBox .ov h3{color:#fff;font-size:20px;margin:0;}
#heroBox .ov span{color:rgba(255,255,255,.8);font-size:12px;}
#heroBadge{float:right;background:rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:bold;border:1px solid rgba(255,255,255,.4);}

/* CARDS */
.card{background:#fff;border-radius:8px;margin-bottom:8px;overflow:hidden;}
.cardHead{width:100%;padding:12px;border:none;background:#f5f5f5;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Noto Sans Devanagari',Arial,sans-serif;}
.cardHead:active{background:#e0e0e0;}
.tag{display:inline-block;padding:3px 7px;border-radius:5px;color:#fff;font-size:10px;font-weight:bold;white-space:nowrap;font-family:Arial,sans-serif;}
.cardTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.4;}
.arrow{font-size:14px;color:#555;margin-left:4px;}
.cardBody{display:none;padding:8px 12px 12px;}
.item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #e0e0e0;align-items:flex-start;}
.item:last-child{border-bottom:none;}
.bullet{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.item p{margin:0;font-size:13px;color:#333;line-height:1.6;}

/* NAV */
#navRow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.navBtn{flex:1;padding:13px 6px;background:#1b5e20;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;font-family:'Noto Sans Devanagari',Arial,sans-serif;}
.navBtn:disabled{background:#444;color:#888;}
.navBtn:active{background:#2e7d32;}
#pg{text-align:center;font-size:12px;color:#95d5b2;white-space:nowrap;}

/* FOOTER */
#foot{text-align:center;padding:14px;color:#52b788;font-size:10px;letter-spacing:1px;}
</style>

var cur=0;
var openState={};

function go(i){
  if(i<0||i>=months.length)return;
  cur=i;
  draw();
  window.scrollTo(0,0);
}

function toggleCard(idx){
  var key=cur+"-"+idx;
  openState[key]=openState[key]?false:true;
  var bd=document.getElementById("bd"+idx);
  var ar=document.getElementById("ar"+idx);
  if(openState[key]){bd.style.display="block";ar.innerHTML="&#9650;";}
  else{bd.style.display="none";ar.innerHTML="&#9660;";}
}

function draw(){
  var mn=months[cur];

  var bar="";
  for(var i=0;i<months.length;i++){
    var active=i===cur;
    var st=active?"background:"+months[i].a+";border-color:"+months[i].a+";color:#fff;font-weight:bold;":"";
    bar+='<span class="mBtn" style="'+st+'" onclick="go('+i+')">'+months[i].e+" "+months[i].m+'</span>';
  }
  document.getElementById("monthBar").innerHTML=bar;

  setTimeout(function(){
    var btns=document.querySelectorAll(".mBtn");
    if(btns[cur])btns[cur].scrollIntoView({inline:"center"});
  },80);

  var img=document.getElementById("hImg");
  img.style.display="block";
  img.style.opacity="0";
  img.src=mn.img;
  img.onload=function(){img.style.transition="opacity 0.5s";img.style.opacity="1";};
  img.onerror=function(){img.style.display="none";};

  document.getElementById("heroBox").style.background=mn.a;
  document.getElementById("hMonth").innerHTML=mn.e+" "+mn.m;
  document.getElementById("hSeason").innerHTML=mn.s;
  document.getElementById("heroBadge").innerHTML=mn.b;

  var html="";
  for(var i=0;i<mn.t.length;i++){
    var t=mn.t[i];
    var isOpen=openState[cur+"-"+i]?true:false;
    var items="";
    for(var j=0;j<t.i.length;j++){
      items+='<div class="item"><div class="bullet" style="background:'+t.c+'"></div><p>'+t.i[j]+'</p></div>';
    }
    html+='<div class="card">';
    html+='<button class="cardHead" style="background:'+mn.bg+'" onclick="toggleCard('+i+')">';
    html+='<span class="tag" style="background:'+t.c+'">'+t.tg+'</span>';
    html+='<span class="cardTitle">'+t.h+'</span>';
    html+='<span class="arrow" id="ar'+i+'">'+(isOpen?"&#9650;":"&#9660;")+'</span>';
    html+='</button>';
    html+='<div class="cardBody" id="bd'+i+'" style="display:'+(isOpen?"block":"none")+'">'+items+'</div>';
    html+='</div>';
  }
  document.getElementById("cards").innerHTML=html;

  var pb=document.getElementById("pBtn");
  var nb=document.getElementById("nBtn");
  pb.disabled=cur===0;
  pb.innerHTML=cur>0?"&#8592; "+months[cur-1].e+" "+months[cur-1].m:"&#8592; पिछला";
  nb.disabled=cur===months.length-1;
  nb.innerHTML=cur<months.length-1?months[cur+1].e+" "+months[cur+1].m+" &#8594;":"अगला &#8594;";
  document.getElementById("pg").innerHTML=(cur+1)+" / "+months.length;
}

draw();
</script>
