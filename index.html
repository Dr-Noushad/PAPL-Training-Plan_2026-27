<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPL Farmer Training Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#071a07;color:#222;overflow-x:hidden;}

/* HEADER */
#hdr{background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 50%,#1b4332 100%);padding:14px 12px 12px;text-align:center;border-bottom:3px solid #52b788;position:relative;}
#hdr::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;background:linear-gradient(90deg,#7dc142,#52b788,#2d6a4f,#7dc142);background-size:200%;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
#hdr h1{color:#7dc142;font-size:18px;font-weight:900;letter-spacing:.5px;}
#hdr p{color:#b7e4c7;font-size:10px;letter-spacing:2px;margin-top:2px;}
#hdr h2{color:#fff;font-size:14px;margin:6px 0 2px;font-weight:700;}
#hdr small{color:#95d5b2;font-size:10px;}

/* TOP BAR */
#topBar{background:#040f04;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;gap:6px;flex-wrap:wrap;border-bottom:1px solid #1a3a1a;}
.lBtn{padding:6px 14px;border-radius:20px;border:2px solid #52b788;background:transparent;color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;}
.lBtn.on{background:#52b788;color:#040f04;}
.vTabs{display:flex;gap:5px;}
.vTab{padding:6px 12px;border-radius:7px;border:2px solid transparent;background:rgba(255,255,255,.07);color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;}
.vTab.on{background:#2e7d32;color:#fff;border-color:#52b788;}

/* CROP JOURNEY TIMELINE */
#timeline{background:#040f04;padding:10px 10px 6px;border-bottom:2px solid #1a3a1a;overflow-x:auto;scrollbar-width:none;}
#timeline::-webkit-scrollbar{display:none;}
.tlWrap{display:flex;align-items:center;min-width:600px;padding:2px 4px;}
.tlStep{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;cursor:pointer;}
.tlStep:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;right:-50%;height:2px;background:#1a3a1a;z-index:0;}
.tlStep.done:not(:last-child)::after{background:linear-gradient(90deg,#7dc142,#52b788);animation:growLine .5s ease forwards;}
@keyframes growLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.tlDot{width:28px;height:28px;border-radius:50%;background:#1a3a1a;border:2px solid #2a4a2a;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:1;transition:all .4s;position:relative;}
.tlStep.done .tlDot{background:linear-gradient(135deg,#2e7d32,#7dc142);border-color:#7dc142;box-shadow:0 0 8px rgba(125,193,66,.6);transform:scale(1.15);}
.tlStep.active .tlDot{background:linear-gradient(135deg,#7dc142,#a5d63f);border-color:#fff;box-shadow:0 0 12px rgba(125,193,66,.9);transform:scale(1.25);animation:pulse .8s ease infinite alternate;}
@keyframes pulse{from{box-shadow:0 0 8px rgba(125,193,66,.6)}to{box-shadow:0 0 18px rgba(125,193,66,1)}}
.tlLabel{font-size:8px;color:#556655;margin-top:3px;text-align:center;line-height:1.2;max-width:44px;transition:color .4s;}
.tlStep.done .tlLabel,.tlStep.active .tlLabel{color:#95d5b2;}

/* MONTH BAR */
#mBar{background:#040f04;padding:8px 6px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;border-bottom:2px solid #1a3a1a;}
#mBar::-webkit-scrollbar{display:none;}
.mBtn{display:inline-block;padding:7px 10px;margin:0 2px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,.07);color:#95d5b2;font-size:11px;cursor:pointer;transition:all .25s;white-space:nowrap;}

/* MAIN */
#main{padding:10px;max-width:700px;margin:0 auto;}

/* HERO CARD */
#heroCard{border-radius:14px;overflow:hidden;margin-bottom:12px;position:relative;background:#1a3a1a;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#heroCard.out{animation:slideOutL .32s cubic-bezier(.4,0,.2,1) forwards;}
#heroCard.in{animation:slideInR .35s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes slideOutL{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(-50px) scale(.96)}}
@keyframes slideInR{from{opacity:0;transform:translateX(50px) scale(.96)}to{opacity:1;transform:translateX(0) scale(1)}}

/* SVG COTTON ILLUSTRATION */
#cottonSVG{width:100%;height:200px;display:block;}

/* HERO INFO OVERLAY */
.heroInfo{padding:12px 14px 10px;background:linear-gradient(135deg,rgba(0,0,0,.0),rgba(0,0,0,.0));}
.monthBadge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;margin-bottom:6px;letter-spacing:.5px;}
.monthTitle{font-size:22px;font-weight:900;color:#fff;line-height:1.1;text-shadow:1px 2px 8px rgba(0,0,0,.7);}
.monthSub{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;display:block;}

/* KEY ACTIVITY BANNER */
#keyBanner{border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.keyTop{padding:10px 14px 8px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.keyBlock{flex:1;min-width:140px;}
.keyLabel{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;opacity:.85;}
.keyTags{display:flex;flex-wrap:wrap;gap:5px;}
.keyTag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;animation:blink 2s ease-in-out infinite;}
.keyTag.method{animation:none;opacity:.9;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.97)}}
.keyDivider{width:1px;background:rgba(255,255,255,.2);margin:4px 0;}

/* ACTIVITY HIGHLIGHT */
.activityBar{display:flex;gap:6px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,.2);}
.activityBar::-webkit-scrollbar{display:none;}
.actTag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;flex-shrink:0;}

/* CARDS */
.card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.cardHead{width:100%;padding:12px;border:none;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;transition:filter .15s;}
.cardHead:active{filter:brightness(.93);}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;color:#fff;font-size:10px;font-weight:bold;white-space:nowrap;flex-shrink:0;}
.cTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.35;}
.arr{font-size:13px;color:#555;flex-shrink:0;margin-left:4px;}
.cBody{display:none;padding:8px 13px 13px;border-top:1px solid #eee;}
.item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;align-items:flex-start;}
.item:last-child{border-bottom:none;}
.dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.item p{margin:0;font-size:13px;color:#333;line-height:1.55;}
.resBtn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:9px 16px;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:8px;font-size:12px;font-weight:bold;text-decoration:none;box-shadow:0 2px 8px rgba(46,125,50,.4);}

/* MODULE VIEW */
#modView{display:none;}
.modCard{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.modHead{width:100%;padding:12px;border:none;background:#f7f7f7;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:Arial,sans-serif;}
.modNum{width:38px;height:38px;border-radius:50%;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.3;}
.modBody{display:none;padding:10px 14px 13px;border-top:1px solid #eee;}
.subList{list-style:none;}
.subList li{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px;color:#333;line-height:1.5;align-items:flex-start;}
.subList li:last-child{border-bottom:none;}

/* NAV */
#navRow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.navBtn{flex:1;padding:13px 6px;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:all .2s;background:linear-gradient(135deg,#1b5e20,#2e7d32);}
.navBtn:active{transform:scale(.97);}
.navBtn:disabled{background:#1a2a1a;color:#3a5a3a;}
#pg{text-align:center;font-size:12px;color:#7dc142;white-space:nowrap;font-weight:bold;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.3)}50%{opacity:.7;box-shadow:0 2px 14px rgba(255,255,255,.4)}}
#foot{text-align:center;padding:14px;color:#52b788;font-size:10px;letter-spacing:2px;}
</style>
</head>
<body>

<div id="hdr">
  <h1>Ploughman Agro Pvt. Limited</h1>
  <p>PAPL &bull; SUSTAINABLE BY DESIGN &bull; टिकाऊ खेती, बेहतर कल</p>
  <h2 id="calTitle">🌿 Farmer Training Calendar 2026-27</h2>
  <small id="calSub">10 Modules · Organic Cotton · Rabi Crops · Farm Diary</small>
</div>

<div id="topBar">
  <div style="display:flex;gap:6px;">
    <button class="lBtn on" onclick="setLang('en',this)">🇬🇧 English</button>
    <button class="lBtn" onclick="setLang('hi',this)">🇮🇳 हिंदी</button>
  </div>
  <div class="vTabs">
    <button class="vTab on" id="tCal" onclick="setView('cal')">📅 Calendar</button>
    <button class="vTab" id="tMod" onclick="setView('mod')">📚 Modules</button>
  </div>
</div>

<!-- CROP JOURNEY TIMELINE -->
<div id="timeline">
  <div class="tlWrap" id="tlWrap"></div>
</div>

<div id="mBar"></div>

<div id="main">
  <div id="calView">
    <div id="heroCard">
      <svg id="cottonSVG" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"></svg>
      <div class="heroInfo">
        <div class="monthBadge" id="mBadge"></div>
        <div class="monthTitle" id="mTitle"></div>
        <span class="monthSub" id="mSub"></span>
      </div>
      <div class="activityBar" id="actBar"></div>
    </div>
    <div id="keyBanner"></div>
    <div id="cards"></div>
    <div id="navRow">
      <button class="navBtn" id="pBtn" onclick="go(cur-1)">&#8592; <span id="pLbl">Prev</span></button>
      <div id="pg"></div>
      <button class="navBtn" id="nBtn" onclick="go(cur+1)"><span id="nLbl">Next</span> &#8594;</button>
    </div>
  </div>
  <div id="modView"></div>
</div>
<div id="foot">PAPL &copy; 2026 &bull; <span id="fTxt">ORGANIC FARMING PROGRAM</span></div>

<script>
var lang="en", view="cal", cur=0, openState={}, modOpen={};

// ── TIMELINE STAGES ──────────────────────────────────────────────
var TL=[
  {icon:"🌾",label:"Land\nPrep",months:[0]},
  {icon:"🌱",label:"Seed\nTreat",months:[0,1]},
  {icon:"🌧️",label:"Sowing",months:[1]},
  {icon:"🌿",label:"Germina-\ntion",months:[2]},
  {icon:"🍃",label:"Vegetative\nGrowth",months:[2,3]},
  {icon:"🌸",label:"Flowering",months:[4]},
  {icon:"🪴",label:"Boll\nFormation",months:[5]},
  {icon:"⚪",label:"Harvest",months:[6,7,8]},
  {icon:"♻️",label:"Post\nHarvest",months:[9,10,11]},
];

// ── SVG ILLUSTRATIONS (cotton-crop-stage) ────────────────────────
function drawSVG(monthIdx, svgEl){
  var W=400, H=200;
  var scenes=[
    // 0-May: Land prep + compost training
    function(s){
      s.innerHTML='';
      grad(s,'bg0','#8B4513','#D2691E');
      rect(s,0,0,W,H,'url(#bg0)');
      // soil texture rows
      for(var i=0;i<6;i++) line(s,0,80+i*20,W,80+i*20,'rgba(0,0,0,.15)',1.5);
      // compost heap
      ellipse(s,300,130,50,25,'#5D4037');
      ellipse(s,300,120,45,20,'#795548');
      text(s,300,118,'♻️',14,'middle');
      // farmers silhouettes
      farmer(s,80,155,'#4a2c00',true);
      farmer(s,130,155,'#3a2000',false);
      farmer(s,200,155,'#4a2c00',true);
      // sun
      sun(s,350,35,28);
      // label
      badge(s,10,10,'🌾 LAND PREPARATION & COMPOST','#E65100');
    },
    // 1-June: Cotton sowing in rain
    function(s){
      s.innerHTML='';
      grad(s,'bg1','#1a3a2a','#2d5a3a');
      rect(s,0,0,W,H,'url(#bg1)');
      // rain
      for(var i=0;i<20;i++){
        var rx=20+i*18+Math.sin(i)*8, ry=(i%3)*30+10;
        line(s,rx,ry,rx-3,ry+18,'rgba(100,180,255,.5)',1);
      }
      // soil rows
      for(var i=0;i<4;i++){rect(s,0,115+i*16,W,8,i%2?'#3e2723':'#4e342e');}
      // seeds in ground
      for(var i=0;i<7;i++){
        ellipse(s,30+i*55,122,6,4,'#d4b896');
        // tiny sprout
        if(i%2===0){
          line(s,30+i*55,118,30+i*55,108,'#4caf50',1.5);
          leaf(s,30+i*55,108,8,true,'#66bb6a');
        }
      }
      // farmers sowing
      farmer(s,60,148,'#2e1a00',true);
      farmer(s,200,148,'#1a2e00',false);
      farmer(s,340,148,'#2e1a00',true);
      badge(s,10,10,'🌧️ COTTON SOWING','#2E7D32');
    },
    // 2-July: Seedlings + intercultural
    function(s){
      s.innerHTML='';
      grad(s,'bg2','#0d2b0d','#1a4a1a');
      rect(s,0,0,W,H,'url(#bg2)');
      // ground
      rect(s,0,145,W,55,'#3e2723');
      // seedlings row
      for(var i=0;i<8;i++){
        var px=25+i*50;
        stem(s,px,145,35);
        leaf(s,px,120,12,true,'#66bb6a');
        leaf(s,px,120,12,false,'#81c784');
      }
      // farmers doing intercultural
      farmer(s,100,148,'#2e1a00',true);
      farmer(s,270,148,'#1a2e00',false);
      // hoe tool
      line(s,115,130,130,155,'#5d4037',2);
      badge(s,10,10,'🌿 SEEDLING STAGE & GAP FILLING','#1565C0');
    },
    // 3-August: Vigorous growth + weeding + jeevamrut
    function(s){
      s.innerHTML='';
      grad(s,'bg3','#071a07','#0d2b0d');
      rect(s,0,0,W,H,'url(#bg3)');
      rect(s,0,148,W,52,'#2e1a0a');
      // tall cotton plants
      for(var i=0;i<6;i++){
        var px=30+i*65;
        stem(s,px,148,80);
        for(var l=0;l<4;l++){
          leaf(s,px,130-l*18,15+l*2,l%2===0,'#4caf50');
          leaf(s,px,130-l*18,15+l*2,l%2!==0,'#66bb6a');
        }
      }
      farmer(s,80,150,'#2e1a00',true);
      farmer(s,320,150,'#1a2e00',false);
      // jeevamrut pot
      ellipse(s,200,158,18,12,'#795548');
      text(s,200,156,'🪣',12,'middle');
      badge(s,10,10,'🍃 VEGETATIVE GROWTH & ORGANIC INPUTS','#558B2F');
    },
    // 4-September: Flowering + pest scouting + pheromone traps
    function(s){
      s.innerHTML='';
      grad(s,'bg4','#1a0f00','#2d1a00');
      rect(s,0,0,W,H,'url(#bg4)');
      rect(s,0,148,W,52,'#3e2723');
      // cotton plants with flowers
      for(var i=0;i<5;i++){
        var px=35+i*80;
        stem(s,px,148,85);
        for(var l=0;l<3;l++){
          leaf(s,px,128-l*22,14,l%2===0,'#388e3c');
          leaf(s,px,128-l*22,14,l%2!==0,'#4caf50');
        }
        // flower
        flower(s,px,55+Math.sin(i)*5);
      }
      // pheromone trap
      trapPole(s,280,148);
      // farmers scouting
      farmer(s,70,150,'#2e1a00',true);
      farmer(s,350,150,'#1a2e00',false);
      badge(s,10,10,'🌸 FLOWERING & PEST SCOUTING','#E65100');
    },
    // 5-October: Green bolls
    function(s){
      s.innerHTML='';
      grad(s,'bg5','#0a0518','#1a0a28');
      rect(s,0,0,W,H,'url(#bg5)');
      rect(s,0,148,W,52,'#2e1a0a');
      for(var i=0;i<5;i++){
        var px=35+i*80;
        stem(s,px,148,88);
        for(var l=0;l<3;l++){
          leaf(s,px,125-l*22,14,l%2===0,'#2e7d32');
          leaf(s,px,125-l*22,14,l%2!==0,'#388e3c');
        }
        // green boll
        ellipse(s,px,45,14,14,'#4caf50');
        ellipse(s,px,45,10,10,'#66bb6a');
        // boll segments
        for(var seg=0;seg<4;seg++){
          var a=seg/4*Math.PI*2;
          line(s,px,45,px+Math.cos(a)*10,45+Math.sin(a)*10,'#388e3c',0.8);
        }
      }
      farmer(s,80,150,'#2e1a00',true);
      farmer(s,330,150,'#1a2e00',false);
      badge(s,10,10,'🪴 GREEN BOLL DEVELOPMENT','#AD1457');
    },
    // 6-November: Mature bolls – field inspection
    function(s){
      s.innerHTML='';
      grad(s,'bg6','#0a0f1a','#1a1a0a');
      rect(s,0,0,W,H,'url(#bg6)');
      rect(s,0,148,W,52,'#2e1a0a');
      for(var i=0;i<5;i++){
        var px=35+i*80;
        stem(s,px,148,88);
        for(var l=0;l<3;l++){
          leaf(s,px,125-l*22,13,l%2===0,'#2e7d32');
          leaf(s,px,125-l*22,13,l%2!==0,'#388e3c');
        }
        // mature white boll opening
        ellipse(s,px,45,16,16,'#fff9c4');
        for(var p=0;p<4;p++){
          var a2=p/4*Math.PI*2;
          ellipse(s,px+Math.cos(a2)*8,45+Math.sin(a2)*8,7,7,'#fff');
        }
      }
      farmer(s,70,150,'#2e1a00',true);
      farmer(s,350,150,'#1a2e00',false);
      badge(s,10,10,'⚪ MATURE BOLLS – FIELD INSPECTION','#283593');
    },
    // 7-December: First picking
    function(s){
      s.innerHTML='';
      grad(s,'bg7','#040f04','#0a1f0a');
      rect(s,0,0,W,H,'url(#bg7)');
      rect(s,0,148,W,52,'#2e1a0a');
      for(var i=0;i<5;i++){
        var px=35+i*80;
        stem(s,px,148,88);
        for(var l=0;l<3;l++){
          leaf(s,px,125-l*22,12,l%2===0,'#1b5e20');
          leaf(s,px,125-l*22,12,l%2!==0,'#2e7d32');
        }
        // cotton fluff opening wide
        for(var p=0;p<5;p++){
          var a3=p/5*Math.PI*2-Math.PI/2;
          ellipse(s,px+Math.cos(a3)*10,45+Math.sin(a3)*10,8,8,'#fff');
        }
        ellipse(s,px,45,6,6,'#fff9c4');
      }
      // farmers picking with bags
      farmerPick(s,110,148);
      farmerPick(s,250,148);
      badge(s,10,10,'🌟 FIRST COTTON PICKING','#006064');
    },
    // 8-January: Harvesting & bagging
    function(s){
      s.innerHTML='';
      grad(s,'bg8','#040f04','#071407');
      rect(s,0,0,W,H,'url(#bg8)');
      rect(s,0,148,W,52,'#2e1a0a');
      for(var i=0;i<4;i++){
        var px=30+i*90;
        stem(s,px,148,70);
        leaf(s,px,120,12,true,'#1b5e20');
        leaf(s,px,120,12,false,'#2e7d32');
        // sparse remaining bolls
        if(i%2===0){
          ellipse(s,px,55,8,8,'#fff9c4');
          for(var p=0;p<4;p++){var a4=p/4*Math.PI*2;ellipse(s,px+Math.cos(a4)*6,55+Math.sin(a4)*6,5,5,'#fff');}
        }
      }
      // cotton bags/baskets
      bag(s,190,145);
      bag(s,290,145);
      farmerPick(s,80,148);
      farmerPick(s,340,148);
      badge(s,10,10,'🧺 COTTON HARVESTING & BAGGING','#4527A0');
    },
    // 9-February: Final picking + cleaning
    function(s){
      s.innerHTML='';
      grad(s,'bg9','#0f1a00','#1a2e00');
      rect(s,0,0,W,H,'url(#bg9)');
      rect(s,0,148,W,52,'#2e1a0a');
      // mostly bare stalks
      for(var i=0;i<6;i++){
        var px=30+i*65;
        stem(s,px,148,60);
        leaf(s,px,118,10,i%2===0,'#1b5e20');
      }
      // group of women sorting cotton
      farmer(s,80,150,'#4a2000',false);
      farmer(s,130,150,'#3a1800',true);
      farmer(s,180,150,'#4a2000',false);
      farmer(s,230,150,'#3a1800',true);
      // cotton pile
      for(var k=0;k<5;k++) ellipse(s,330+k%3*14,155-k*4,10,8,'#fff');
      badge(s,10,10,'👥 FINAL PICKING & SORTING','#558B2F');
    },
    // 10-March: Crop residue + compost
    function(s){
      s.innerHTML='';
      grad(s,'bg10','#1a0f00','#2e1a00');
      rect(s,0,0,W,H,'url(#bg10)');
      rect(s,0,148,W,52,'#3e2723');
      // stubble / residue
      for(var i=0;i<12;i++){
        var px=15+i*32, ph=20+Math.sin(i)*8;
        line(s,px,148,px,148-ph,'#795548',2);
      }
      // compost pit
      rect(s,240,130,80,30,'#5d4037');
      rect(s,245,132,70,26,'#4e342e');
      text(s,280,147,'♻️ COMPOST',9,'middle','#ffcc80');
      // farmers managing residue
      farmer(s,70,150,'#2e1a00',true);
      farmer(s,160,150,'#1a2e00',false);
      badge(s,10,10,'♻️ RESIDUE MGMT & COMPOST PIT','#4E342E');
    },
    // 11-April: Review meeting
    function(s){
      s.innerHTML='';
      grad(s,'bg11','#1a1000','#2e2000');
      rect(s,0,0,W,H,'url(#bg11)');
      // meeting room feel - table
      rect(s,80,130,240,20,'#6d4c41');
      rect(s,75,125,250,8,'#795548');
      // charts/boards
      rect(s,20,60,80,70,'#fff9c4');
      line(s,25,65,25,125,'#a5d63f',1.5);
      line(s,25,125,95,125,'#a5d63f',1.5);
      // bar chart
      for(var b=0;b<4;b++){
        var bh=15+b*10;
        rect(s,30+b*16,125-bh,12,bh,b===3?'#7dc142':'#a5d63f');
      }
      // people around table
      for(var p=0;p<5;p++){
        var px2=100+p*45;
        farmer(s,px2,135,'#2e1a00',p%2===0);
      }
      text(s,60,55,'📊 ANNUAL REVIEW',8,'middle','#ffd54f');
      badge(s,10,10,'📋 REVIEW MEETING & NEXT SEASON PLAN','#F57F17');
    },
  ];
  var fn=scenes[monthIdx];
  if(fn) fn(svgEl);
}

// ── SVG HELPERS ───────────────────────────────────────────────────
function svgEl(tag,attrs){
  var el=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  return el;
}
function grad(s,id,c1,c2){
  var defs=s.querySelector('defs')||s.insertBefore(svgEl('defs',{}),s.firstChild);
  var lg=svgEl('linearGradient',{id:id,x1:'0%',y1:'0%',x2:'0%',y2:'100%'});
  var st1=svgEl('stop',{'offset':'0%','stop-color':c1});
  var st2=svgEl('stop',{'offset':'100%','stop-color':c2});
  lg.appendChild(st1);lg.appendChild(st2);defs.appendChild(lg);
}
function rect(s,x,y,w,h,fill){s.appendChild(svgEl('rect',{x:x,y:y,width:w,height:h,fill:fill}));}
function ellipse(s,cx,cy,rx,ry,fill){s.appendChild(svgEl('ellipse',{cx:cx,cy:cy,rx:rx,ry:ry,fill:fill}));}
function line(s,x1,y1,x2,y2,stroke,sw){s.appendChild(svgEl('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:stroke,'stroke-width':sw||1}));}
function text(s,x,y,str,size,anchor,fill){
  var t=svgEl('text',{x:x,y:y,'font-size':size,'text-anchor':anchor||'start',fill:fill||'#fff','font-family':'Arial','font-weight':'bold'});
  t.textContent=str; s.appendChild(t);
}
function stem(s,x,baseY,h){
  s.appendChild(svgEl('line',{x1:x,y1:baseY,x2:x,y2:baseY-h,stroke:'#33691e','stroke-width':2.5,'stroke-linecap':'round'}));
}
function leaf(s,x,y,size,left,fill){
  var dx=left?-size:size;
  var p=svgEl('path',{d:'M'+x+','+y+' Q'+(x+dx)+','+(y-size/2)+' '+(x+dx*1.5)+','+(y-size/3),fill:'none',stroke:fill,'stroke-width':2,'stroke-linecap':'round'});
  s.appendChild(p);
}
function flower(s,x,y){
  var petals=['#ffeb3b','#ff9800','#fff9c4','#ffe082','#ffd54f'];
  for(var p=0;p<5;p++){
    var a=p/5*Math.PI*2;
    var el=svgEl('ellipse',{cx:x+Math.cos(a)*9,cy:y+Math.sin(a)*9,rx:5,ry:8,fill:petals[p],transform:'rotate('+(p/5*360)+','+x+','+y+')'});
    s.appendChild(el);
  }
  ellipse(s,x,y,6,6,'#ff6f00');
  ellipse(s,x,y,3,3,'#ffcc02');
}
function farmer(s,x,y,skin,facing){
  // body
  ellipse(s,x,y-28,7,7,skin); // head
  s.appendChild(svgEl('rect',{x:x-5,y:y-21,width:10,height:18,fill:skin,rx:2}));
  // hat
  s.appendChild(svgEl('rect',{x:x-9,y:y-36,width:18,height:4,fill:'#f9a825',rx:1}));
  s.appendChild(svgEl('rect',{x:x-5,y:y-42,width:10,height:8,fill:'#f9a825',rx:2}));
  // legs
  line(s,x-3,y-3,x-4,y+10,skin,2);
  line(s,x+3,y-3,x+4,y+10,skin,2);
}
function farmerPick(s,x,y){
  var skin='#3e2000';
  ellipse(s,x,y-28,7,7,skin);
  s.appendChild(svgEl('rect',{x:x-5,y:y-21,width:10,height:18,fill:'#1565c0',rx:2}));
  s.appendChild(svgEl('rect',{x:x-9,y:y-36,width:18,height:4,fill:'#f9a825',rx:1}));
  // arm reaching up
  line(s,x+5,y-15,x+20,y-28,skin,2);
  // cotton fluff in hand
  ellipse(s,x+22,y-30,6,6,'#fff');
  // bag beside
  s.appendChild(svgEl('rect',{x:x-18,y:y-15,width:14,height:18,fill:'#8d6e63',rx:3}));
  ellipse(s,x-11,y-16,5,3,'#6d4c41');
}
function bag(s,x,y){
  s.appendChild(svgEl('rect',{x:x-20,y:y-25,width:40,height:28,fill:'#8d6e63',rx:4}));
  ellipse(s,x,y-26,12,5,'#795548');
  for(var i=0;i<3;i++) ellipse(s,x-8+i*8,y-12,4,4,'#fff');
}
function trapPole(s,x,y){
  line(s,x,y,x,y-50,'#795548',2);
  s.appendChild(svgEl('rect',{x:x-12,y:y-52,width:24,height:14,fill:'#ffd600',rx:3}));
  text(s,x,y-57,'🦋',9,'middle');
}
function sun(s,x,y,r){
  ellipse(s,x,y,r,r,'#FDD835');
  for(var i=0;i<8;i++){
    var a=i/8*Math.PI*2;
    line(s,x+Math.cos(a)*(r+3),y+Math.sin(a)*(r+3),x+Math.cos(a)*(r+10),y+Math.sin(a)*(r+10),'#FDD835',2);
  }
}
function badge(s,x,y,label,bg){
  var tw=label.length*5.5+16;
  s.appendChild(svgEl('rect',{x:x,y:y,width:tw,height:18,fill:bg,rx:9,opacity:.9}));
  text(s,x+tw/2,y+12,label,8,'middle','#fff');
}

    {h:"M6 – Pest Monitoring, Biocontrol & IPM",tg:"M6",c:"#ad1457",i:["Training covers: major cotton pests and life cycles, pest scouting (10 plants/acre), ETL concept, cultural pest management, bird perches installation, sticky and pheromone trap setup, beneficial insect identification (Chrysoperla, Trichogramma, spiders), and conservation of natural enemies and biocontrol agent release — so farmers monitor, identify and manage pests through IPM without relying on chemicals."]},
    {h:"M10A – Internal Inspection, Compliance & FFB Verification",tg:"M10A",c:"#6a1b9a",i:["Training covers: input and harvest record maintenance, prohibited inputs list, residue contamination risk awareness, parallel production rules check, conducting internal inspection, preparing audit-ready documentation, and FFB verification — so the farm is fully compliant and ready for external certification audit at any time."]},
  ]},
  {m:"September",s:"Kharif Flowering Stage",b:"Flowering",e:"🌸",
   acts:[{l:"🌸 Flowering",c:"#E65100"},{l:"🦋 Pest Scout",c:"#AD1457"},{l:"🌿 Foliar Spray",c:"#558B2F"},{l:"📋 ICS Check",c:"#6A1B9A"},{l:"📋 FFB",c:"#F57F17"}],
   t:[
    {h:"M4 – Nutrient & Foliar Management at Flowering",tg:"M4",c:"#558b2f",i:["Training covers: Panchagavya spray timing at flowering, biofertilizer application (PSB, Azotobacter, Rhizobium), nutrient and micronutrient (Boron, Zinc) deficiency identification and organic remedy, and Vermiwash foliar spray — so farmers maintain optimal nutrition from flowering through boll setting using only organic inputs."]},
    {h:"M6 – Botanical Pest Control, Disease Management & Safe Spraying",tg:"M6",c:"#ad1457",i:["Training covers: neem oil and neem leaf extract spray, botanical extract preparation and use, cow urine formulations, HNPV spray (preparation, dosage and timing), disease management (grey mildew, bacterial blight), Trichoderma biocontrol agents, field hygiene practices, spray scheduling, cut-off period, and personal protection — so farmers manage pests and diseases organically with safe, effective spraying practices."]},
    {h:"M10A – ICS Compliance Check & FFB Review",tg:"M10A",c:"#6a1b9a",i:["Training covers: mid-season organic standards review, internal inspection process, farmer responsibilities under ICS, non-compliance identification and corrective action, and FFB check — so all certification records are up to date and the farm is compliant before the critical harvest period."]},
  ]},
  {m:"October",s:"Kharif Boll Development",b:"Boll Stage",e:"🪴",
   acts:[{l:"🟢 Green Bolls",c:"#2E7D32"},{l:"🔍 Monitoring",c:"#1565C0"},{l:"💧 Irrigation",c:"#0277BD"},{l:"📓 Diary Review",c:"#6A1B9A"}],
   t:[
    {h:"M6 – Boll Stage Pest Management",tg:"M6",c:"#ad1457",i:["Training covers: pink and American bollworm organic management, spray scheduling with pre-harvest cut-off period, final bird perch monitoring, and boll damage assessment — so farmers protect the developing bolls and stop spraying at the right time to maintain organic integrity before harvest."]},
    {h:"M7 – Water Management & Climate-Smart Farming",tg:"M7",c:"#0277bd",i:["Training covers: critical irrigation stages for boll filling, water-saving techniques (furrow, drip, sprinkler), drought management practices, climate change awareness, and carbon sequestration basics — so farmers ensure adequate water during boll development while building climate resilience on their farms."]},
    {h:"M10A – Farm Diary Mid-Season Review by VRP/Agronomist",tg:"M10A",c:"#6a1b9a",i:["Training covers: cross-verification of all diary entries by VRP/Agronomist, correction of incomplete records, input cost calculation, and yield forecasting based on boll count — so every farmer's record is accurate, complete and ready for the approaching harvest and audit."]},
  ]},
  {m:"November",s:"Mature Bolls – Field Inspection",b:"Mature Bolls",e:"⚪",
   acts:[{l:"⚪ Mature Bolls",c:"#283593"},{l:"🌟 1st Pick",c:"#006064"},{l:"🏭 CFC",c:"#E65100"},{l:"🔍 Field Check",c:"#1565C0"},{l:"📦 Pre-Harvest",c:"#558B2F"},{l:"📋 Records",c:"#6A1B9A"}],
   t:[
    {h:"M7 & M8 – Pre-Harvest Preparation, Livestock & Traceability",tg:"M8",c:"#283593",i:["Training covers: boll maturity indicators, field quality assessment, storage area preparation for organic cotton, separate tagging system, transport and traceability planning, 1st pick preparation and CFC coordination, post-harvest cotton stalk planning for livestock nutrient recycling, and pre-harvest field hygiene — so farmers are fully organised for a clean, traceable and quality organic harvest."]},
    {h:"M10A – Pre-Harvest Compliance & Lot ID Setup",tg:"M10A",c:"#6a1b9a",i:["Training covers: pre-harvest diary completion, lot identification system setup, and non-compliance corrective action — so every cotton lot is properly identified, documented and compliant with organic certification requirements before the first pick."]},
  ]},
  {m:"December",s:"First Cotton Picking",b:"First Picking",e:"🌟",
   acts:[{l:"🌟 First Pick",c:"#006064"},{l:"🧺 Organic Bags",c:"#795548"},{l:"✅ Quality Check",c:"#558B2F"},{l:"📦 Lot ID",c:"#283593"}],
   t:[
    {h:"M8 & M9 – Cotton Picking, Quality & Group Coordination",tg:"M8",c:"#283593",i:["Training covers: maturity indicators for picking, clean picking without contamination, use of separate bags for organic cotton, weighment and tagging, first lot identification and records, OPG coordination for collective harvest, lead farmer quality monitoring, community-level quality checks, and collective weighment records — so the first pick is clean, traceable and collectively managed."]},
    {h:"M10A – Harvest Diary & Traceability Records",tg:"M10A",c:"#6a1b9a",i:["Training covers: harvest diary entries, lot-wise quality records, and traceability documentation — so every bag of organic cotton picked has a clear, documented identity from field to CFC."]},
  ]},
  {m:"January",s:"Cotton Harvesting & Bagging",b:"Harvesting",e:"🧺",
   acts:[{l:"🧺 Harvesting",c:"#4527A0"},{l:"🏷️ Lot Tagging",c:"#283593"},{l:"💰 Premium Price",c:"#F57F17"},{l:"📊 Yield Record",c:"#558B2F"}],
   t:[
    {h:"M8 – Continued Harvesting, Baling, Marketing & Farm Economics",tg:"M8",c:"#283593",i:["Training covers: continued cotton harvesting, cotton bale preparation, transport precautions, maintaining organic integrity during transport, quality grading, organic cotton value chain, premium pricing documentation, and collective marketing approach with cost-benefit analysis — so farmers complete the harvest professionally and understand the economic value of their organic cotton."]},
    {h:"M10B/C – Child Labour Awareness & Women Safety during Harvest",tg:"M10BC",c:"#c62828",i:["Training covers: child labour awareness during harvest operations, women's safety in field, equal wages for equal work, and health and safety practices — so every worker on the farm is protected, respected and fairly compensated during the harvest season."]},
  ]},
  {m:"February",s:"Final Picking & Cleaning/Sorting",b:"Final Picking",e:"👥",
   acts:[{l:"👥 Group Sorting",c:"#558B2F"},{l:"🧹 Cleaning",c:"#795548"},{l:"📊 Yield Count",c:"#283593"},{l:"💊 Health Check",c:"#C62828"}],
   t:[
    {h:"Rabi – Rabi Nutrient Boost",tg:"Rabi",c:"#795548",i:["Training covers: compost tea and Jeevamrut drench for Rabi crops, Panchagavya spray for grain filling, and micronutrient management (Zinc, Sulfur) — so farmers apply timely organic nutrition to maximise Rabi crop yield and quality."]},
    {h:"M10D/E/F – Labour Rights, Women Protection & Farm Safety",tg:"M10DE",c:"#e65100",i:["Training covers: avoiding heavy work for pregnant and lactating women, safe work conditions and rest, equal wages for all workers, no bonded or forced labour, first aid awareness, heat stress prevention, and safe storage of farm inputs — so every worker on the farm works safely, fairly and with dignity throughout the season."]},
    {h:"M10A – Farm Diary Compliance Verification & Audit Simulation",tg:"M10A",c:"#6a1b9a",i:["Training covers: verification of all diary entries, internal audit simulation with a checklist, total organic inputs calculation, and farmer self-assessment questionnaire — so farmers are confident and audit-ready with complete, accurate records at season end."]},
  ]},
  {m:"March",s:"Crop Residue Mgmt & Compost Prep",b:"Post-Harvest",e:"♻️",
   acts:[{l:"♻️ Residue Mgmt",c:"#4E342E"},{l:"🪣 Compost Pit",c:"#558B2F"},{l:"🌾 Rabi Harvest",c:"#795548"},{l:"💰 Cost-Benefit",c:"#283593"}],
   t:[
    {h:"Rabi & M8 – Rabi Harvest, Yield Recording & Cost-Benefit Analysis",tg:"M8",c:"#283593",i:["Training covers: harvest maturity indicators for wheat, chickpea and mustard; threshing, cleaning and organic storage; seed saving (selection, drying and storage); avoiding contamination in transport; yield estimation and weighment; closing the Farm Diary with production and sale entries; cost of cultivation vs income calculation; and organic premium documentation for certification — so farmers complete Rabi operations professionally and understand full season profitability."]},
    {h:"M10G/H – Non-Discrimination, Inclusion & Grievance System",tg:"M10GH",c:"#4527a0",i:["Training covers: no caste or gender discrimination on farm, respectful behaviour among all farmers and workers, inclusion of small and marginal farmers, grievance and complaint process for farmers and workers, and safe reporting system with conflict resolution — so every person on the farm is treated fairly and knows how to raise concerns safely."]},
  ]},
  {m:"April",s:"Review Meeting & Next Season Plan",b:"Annual Review",e:"📋",
   acts:[{l:"📋 Annual Review",c:"#F57F17"},{l:"📊 Presentations",c:"#6A1B9A"},{l:"🌱 Next Plan",c:"#2E7D32"},{l:"🏆 Recognition",c:"#E65100"},{l:"📝 Farmer Registration",c:"#C62828"}],
   t:[
    {h:"M10A – Annual Audit, Diary Closure & Farmer Recognition",tg:"M10A",c:"#6a1b9a",i:["Training covers: complete Farm Diary review for correctness and completeness, external audit process and common findings, non-compliance corrective actions, and recognition of best diary-keeping farmers — so the season is closed with full documentation and learnings recorded for the next cycle."]},
    {h:"M9 – Trainer Skills & Session Planning for VRP and Lead Farmers",tg:"M9",c:"#f57f17",i:["Training covers: communication skills using local language, adult learning methods, demonstration techniques, visual training tools for field use, session planning with attendance and reporting, and farmer follow-up with adoption monitoring — so VRPs and Lead Farmers are equipped to deliver effective, engaging training sessions independently."]},
    {h:"Season Debrief, Next Year Planning & Farmer Registration",tg:"Review",c:"#546e7a",i:["Training covers: group discussion on what worked and what didn't, documentation of best practices from lead farmers, training gap analysis for next season, soil health card review and recommendations, farmer registration for next season, and pre-planning for May seed selection training — so the next season starts better and stronger than the current one."]},
  ]},

hi:{
 calTitle:"🌿 किसान प्रशिक्षण कैलेंडर 2026-27",
 calSub:"10 मॉड्यूल · जैविक कपास · रबी फसलें · फार्म डायरी",
 tabCal:"📅 कैलेंडर",tabMod:"📚 मॉड्यूल",
 prev:"पिछला",next:"अगला",foot:"जैविक कृषि कार्यक्रम",
 months:[
  {m:"मई",s:"खरीफ-पूर्व / ग्रीष्मकाल योजना",b:"प्री-सीजन",e:"☀️",acts:[{l:"🌾 भूमि तैयारी",c:"#E65100"},{l:"🧪 बीज उपचार",c:"#1565C0"},{l:"♻️ कम्पोस्ट",c:"#558B2F"},{l:"👥 ग्राम बैठक",c:"#6A1B9A"},{l:"📝 किसान पंजीकरण",c:"#C62828"}],t:[
    {h:"M2 – बीज चयन और जैविक बीज उपचार",tg:"M2",c:"#1565c0",i:["प्रशिक्षण में शामिल: गैर-BT कपास बीज किस्मों का चयन, बीज गुणवत्ता परीक्षण (अंकुरण % और शुद्धता), और स्थानीय बीज संरक्षण — ताकि किसान सही बीज चुनना और सुरक्षित भंडारण करना सीखें।","किसान बीजामृत, ट्राइकोडर्मा, नीम अर्क और गोमूत्र से बीज उपचार करना सीखेंगे — इन प्रथाओं को अपनाने से स्वस्थ अंकुरण और मिट्टीजनित बीमारियों से सुरक्षा सुनिश्चित होती है।"]},
    {h:"M3 – गर्मियों में मिट्टी तैयारी और भूमि प्रबंधन",tg:"M3",c:"#4e342e",i:["प्रशिक्षण में शामिल: गहरी गर्मी जुताई, हरी खाद फसलें (ढैंचा, सनहेम्प), खेत बंधान और जल निकासी, मानसून से पहले मिट्टी नमी संरक्षण, और बायोचार का उपयोग — ताकि किसान सीजन शुरू होने से पहले स्वस्थ और उत्पादक मिट्टी तैयार करें।"]},
    {h:"M4 – जैविक इनपुट तैयारी और भंडारण",tg:"M4",c:"#558b2f",i:["प्रशिक्षण में शामिल: वर्मीकम्पोस्ट बेड सेटअप, डी-कॉम्पोजर के साथ कम्पोस्ट (विंड्रो/गड्ढा विधि), नाडेप कम्पोस्ट गड्ढा, अरंडी की खली और NSKE उपयोग, जीवामृत, घन जीवामृत, पंचगव्य तैयारी — ताकि बुवाई से पहले सभी जैविक इनपुट तैयार हों।","किसान ऑन-फार्म इनपुट ऑडिट करेंगे — स्टॉक और आवश्यकता का मिलान कर खरीफ सीजन में कोई कमी न हो।"]},
    {h:"सीजन योजना और किसान पंजीकरण",tg:"योजना",c:"#37474f",i:["प्रशिक्षण में शामिल: खरीफ 2026 के लिए फसल रोटेशन योजना, ग्राम बैठक और प्रशिक्षण ओरिएंटेशन, ICS दस्तावेजीकरण के साथ नए किसान ऑनबोर्डिंग, डेमो प्लॉट योजना, और सीजन के लिए किसान पंजीकरण — ताकि हर किसान बुवाई शुरू होने से पहले नामांकित, सूचित और तैयार हो।"]},
  ]},
  {m:"जून",s:"खरीफ बुवाई सीजन",b:"बुवाई",e:"🌱",acts:[{l:"🌧️ मानसून बुवाई",c:"#2E7D32"},{l:"🌱 कपास बीज",c:"#1565C0"},{l:"🌾 पंक्ति बुवाई",c:"#558B2F"},{l:"🌿 अंतरफसल",c:"#006064"},{l:"🧪 बीज प्रक्रिया/बीजामृत",c:"#AD1457"},{l:"📋 FFB",c:"#F57F17"}],t:[
    {h:"M1 – जैविक खेती और कपास का परिचय",tg:"M1",c:"#2e7d32",i:["प्रशिक्षण में शामिल: जैविक खेती क्या है और रासायनिक खेती से अंतर, इतिहास और सिद्धांत, गोबर खाद (FYM) उपयोग और जैविक खेती के फायदे, रासायनिक खेती के हानिकारक प्रभाव, जैविक कपास का महत्व (मूल्य और बाजार मांग), और प्रमाणन की बुनियादी अवधारणा — ताकि किसान समझें कि जैविक खेती सही क्यों है और उसमें उनकी क्या भूमिका है।"]},

// ── FUNCTIONS ────────────────────────────────────────────────────
function setLang(l,btn){
  lang=l; cur=0; openState={};
  document.querySelectorAll(".lBtn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  renderAll();
}

function setView(v){
  view=v;
  document.getElementById("tCal").classList.toggle("on",v==="cal");
  document.getElementById("tMod").classList.toggle("on",v==="mod");
  document.getElementById("calView").style.display=v==="cal"?"block":"none";
  document.getElementById("modView").style.display=v==="mod"?"block":"none";
  document.getElementById("mBar").style.display=v==="cal"?"block":"none";
  document.getElementById("timeline").style.display=v==="cal"?"block":"none";
  var d=DATA[lang];
  document.getElementById("tCal").textContent=d.tabCal;
  document.getElementById("tMod").textContent=d.tabMod;
  if(v==="mod") renderModules();
}

function go(i){
  if(i<0||i>=DATA[lang].months.length) return;
  var hc=document.getElementById("heroCard");
  hc.className="out";
  setTimeout(function(){
    cur=i; openState={};
    renderCalendar();
    hc.className="in";
    setTimeout(function(){hc.className="";},380);
  },300);
  window.scrollTo(0,0);
}

function toggleCard(idx){
  var k=cur+"-"+idx;
  openState[k]=!openState[k];
  document.getElementById("bd"+idx).style.display=openState[k]?"block":"none";
  document.getElementById("ar"+idx).innerHTML=openState[k]?"&#9650;":"&#9660;";
}
function toggleMod(idx){
  modOpen[idx]=!modOpen[idx];
  document.getElementById("mbd"+idx).style.display=modOpen[idx]?"block":"none";
  document.getElementById("mar"+idx).innerHTML=modOpen[idx]?"&#9650;":"&#9660;";
}

function renderTimeline(){
  var html="";
  for(var i=0;i<TL.length;i++){
    var tl=TL[i];
    var isDone=false, isActive=false;
    for(var m=0;m<tl.months.length;m++){
      if(tl.months[m]<cur) isDone=true;
      if(tl.months[m]===cur) isActive=true;
    }
    var cls=isActive?"active":isDone?"done":"";
    html+='<div class="tlStep '+cls+'"><div class="tlDot">'+tl.icon+'</div><div class="tlLabel">'+tl.label+'</div></div>';
  }
  document.getElementById("tlWrap").innerHTML=html;
}

function renderAll(){
  var d=DATA[lang];
  document.getElementById("calTitle").textContent=d.calTitle;
  document.getElementById("calSub").textContent=d.calSub;
  document.getElementById("tCal").textContent=d.tabCal;
  document.getElementById("tMod").textContent=d.tabMod;
  document.getElementById("fTxt").textContent=d.foot;
  if(view==="cal") renderCalendar();
  else renderModules();
}

function renderCalendar(){
  var d=DATA[lang], ms=d.months, mn=ms[cur];
  var grad=GRADS[cur];
  var bg=BG_COLORS[cur];

  // Timeline
  renderTimeline();

  // Month bar
  var bar="";
  for(var i=0;i<ms.length;i++){
    var ac=i===cur, g=GRADS[i];
    var st=ac?"background:"+g+";border-color:transparent;color:#fff;font-weight:bold;":"";
    bar+='<span class="mBtn" style="'+st+'" onclick="go('+i+')">'+ms[i].e+" "+ms[i].m+'</span>';
  }
  document.getElementById("mBar").innerHTML=bar;
  setTimeout(function(){var b=document.querySelectorAll(".mBtn");if(b[cur])b[cur].scrollIntoView({inline:"center"});},60);

  // SVG illustration
  var svgEl2=document.getElementById("cottonSVG");
  drawSVG(cur, svgEl2);

  // Hero info
  document.getElementById("mBadge").textContent=mn.b;
  document.getElementById("mBadge").style.background=grad.split(",")[1]||"#2e7d32";
  document.getElementById("mTitle").innerHTML=mn.e+" "+mn.m;
  document.getElementById("mSub").textContent=mn.s;

  // Activity tags
  var acts="";
  for(var a=0;a<mn.acts.length;a++) acts+='<span class="actTag" style="background:'+mn.acts[a].c+'">'+mn.acts[a].l+'</span>';
  document.getElementById("actBar").innerHTML=acts;

  // Key Activity Banner
  var kd=lang==="hi"?KEY_HI[cur]:KEY_EN[cur];
  var kc=GRADS[cur];
  var klabel1=lang==="hi"?"🎯 मुख्य गतिविधियाँ / प्रशिक्षण विषय":"🎯 Key Training Activities";
  var klabel2=lang==="hi"?"⚙️ कार्यप्रणाली":"⚙️ Methodology";
  var khtml='<div id="keyBanner" style="background:linear-gradient(135deg,'+mn.a+'ee,'+mn.a+'aa);border-radius:10px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.3);">';
  khtml+='<div style="padding:4px 14px 2px;background:rgba(0,0,0,.25);border-radius:10px 10px 0 0;">';
  khtml+='<span style="font-size:10px;font-weight:900;letter-spacing:2px;color:#fff;text-transform:uppercase;opacity:.9;">📌 '+(lang==="hi"?"मासिक प्रशिक्षण फोकस — TRAINER REFERENCE":"Monthly Training Focus — TRAINER REFERENCE")+'</span>';
  khtml+='</div>';
  khtml+='<div style="padding:10px 14px 12px;display:flex;gap:10px;flex-wrap:wrap;">';
  // Activities block
  khtml+='<div style="flex:1;min-width:150px;">';
  khtml+='<div style="font-size:10px;font-weight:900;letter-spacing:1.5px;color:rgba(255,255,255,.8);margin-bottom:6px;">'+klabel1+'</div>';
  khtml+='<div style="display:flex;flex-wrap:wrap;gap:5px;">';
  for(var k=0;k<kd.activities.length;k++){
    var ac=ACT_COLORS[k%ACT_COLORS.length];
    khtml+='<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;background:'+ac+';white-space:nowrap;animation:blink 2s ease-in-out infinite;animation-delay:'+(k*0.3)+'s;box-shadow:0 2px 6px rgba(0,0,0,.3);">'+kd.activities[k]+'</span>';
  }
  khtml+='</div></div>';
  // Divider
  khtml+='<div style="width:1px;background:rgba(255,255,255,.25);margin:2px 0;"></div>';
  // Methods block
  khtml+='<div style="min-width:120px;">';
  khtml+='<div style="font-size:10px;font-weight:900;letter-spacing:1.5px;color:rgba(255,255,255,.8);margin-bottom:6px;">'+klabel2+'</div>';
  khtml+='<div style="display:flex;flex-wrap:wrap;gap:5px;">';
  for(var k=0;k<kd.methods.length;k++){
    khtml+='<span style="display:inline-flex;align-items:center;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.5);white-space:nowrap;backdrop-filter:blur(4px);">⚙️ '+kd.methods[k]+'</span>';
  }
  khtml+='</div></div>';
  khtml+='</div></div>';
  document.getElementById("keyBanner").outerHTML=khtml;
  var html="";
  for(var i=0;i<mn.t.length;i++){
    var t=mn.t[i], op=openState[cur+"-"+i]||false, items="";
    for(var j=0;j<t.i.length;j++) items+='<div class="item"><div class="dot" style="background:'+t.c+'"></div><p>'+t.i[j]+'</p></div>';
    html+='<div class="card"><button class="cardHead" style="background:'+bg+'" onclick="toggleCard('+i+')"><span class="tag" style="background:'+t.c+'">'+t.tg+'</span><span class="cTitle">'+t.h+'</span><span class="arr" id="ar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span></button><div class="cBody" id="bd'+i+'" style="display:'+(op?"block":"none")+'">'+items+'</div></div>';
  }
  document.getElementById("cards").innerHTML=html;

  // Nav
  var pb=document.getElementById("pBtn"), nb=document.getElementById("nBtn");
  pb.disabled=cur===0; nb.disabled=cur===ms.length-1;
  pb.style.background=cur===0?"#1a2a1a":GRADS[cur>0?cur-1:0];
  nb.style.background=cur===ms.length-1?"#1a2a1a":GRADS[cur<ms.length-1?cur+1:cur];
  document.getElementById("pLbl").textContent=cur>0?ms[cur-1].e+" "+ms[cur-1].m:d.prev;
  document.getElementById("nLbl").textContent=cur<ms.length-1?ms[cur+1].e+" "+ms[cur+1].m:d.next;
  document.getElementById("pg").innerHTML='<span style="font-size:16px;">'+mn.e+'</span> '+(cur+1)+" / "+ms.length;
}

function renderModules(){
  var mods=DATA[lang].modules;
  var html="";
  for(var i=0;i<mods.length;i++){
    var m=mods[i], op=modOpen[i]||false, items="";
    for(var j=0;j<m.subs.length;j++) items+='<li><span class="dot" style="background:'+m.color+';width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:8px;flex-shrink:0;margin-top:5px;"></span>'+m.subs[j]+'</li>';
    var dl=DL[m.num];
    var rb=dl?'<a class="resBtn" href="'+dl+'" target="_blank">📁 '+(lang==="hi"?"प्रशिक्षण सामग्री खोलें →":"Open Training Resources →")+'</a>':'<span style="font-size:11px;color:#aaa;font-style:italic;">📁 '+(lang==="hi"?"संसाधन शीघ्र आ रहे हैं":"Resources coming soon")+'</span>';
    html+='<div class="modCard"><button class="modHead" style="background:linear-gradient(135deg,'+m.color+'18,'+m.color+'08)" onclick="toggleMod('+i+')"><div class="modNum" style="background:'+m.color+'">'+m.num+'</div><span class="modTitle">'+m.title+'</span><span class="arr" id="mar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span></button><div class="modBody" id="mbd'+i+'" style="display:'+(op?"block":"none")+'"><ul class="subList">'+items+'</ul><div style="margin-top:12px;">'+rb+'</div></div></div>';
  }
  document.getElementById("modView").innerHTML=html;
}

renderAll();
</script>
