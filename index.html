var animFrame=null;
var particles=[];

function initParticles(theme,W,H){
  particles=[];
  if(theme==="sowing"||theme==="summer"){
    for(var i=0;i<18;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*4+2,vy:Math.random()*0.5+0.2,vx:(Math.random()-0.5)*0.3,c:"rgba(125,193,66,"+(Math.random()*0.5+0.3)+")"});
  } else if(theme==="vegetative"||theme==="ipm"){
    for(var i=0;i<14;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*5+3,vy:-Math.random()*0.4-0.1,vx:(Math.random()-0.5)*0.4,c:"rgba(46,125,50,"+(Math.random()*0.6+0.3)+")"});
  } else if(theme==="flowering"){
    for(var i=0;i<20;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*3+2,vy:-Math.random()*0.5-0.2,vx:(Math.random()-0.5)*0.6,c:i%2===0?"rgba(255,160,0,0.7)":"rgba(255,100,0,0.6)"});
  } else if(theme==="harvest"||theme==="boll"){
    for(var i=0;i<16;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*4+2,vy:-Math.random()*0.3,vx:(Math.random()-0.5)*0.5,c:"rgba(255,255,255,"+(Math.random()*0.5+0.3)+")"});
  } else if(theme==="rabi"||theme==="winter"){
    for(var i=0;i<22;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+1,vy:Math.random()*0.4+0.1,vx:(Math.random()-0.5)*0.4,c:"rgba(200,230,255,"+(Math.random()*0.5+0.2)+")"});
  } else if(theme==="mustard"||theme==="wheat"||theme==="review"){
    for(var i=0;i<16;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*3+2,vy:-Math.random()*0.3-0.1,vx:(Math.random()-0.5)*0.4,c:"rgba(255,200,0,"+(Math.random()*0.5+0.3)+")"});
  }
}

function updateParticles(W,H){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.y>H+10) p.y=-10;
    if(p.y<-10) p.y=H+10;
    if(p.x<-10) p.x=W+10;
    if(p.x>W+10) p.x=-10;
  }
}

function drawParticles(ctx){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.c;
    ctx.fill();
  }
}

// --- THEME DRAW FUNCTIONS ---
function drawSummer(ctx,W,H,t){
  ctx.fillStyle="#2d1200";ctx.fillRect(0,0,W,H);
  // Sun
  var grd=ctx.createRadialGradient(W*0.8,H*0.25,5,W*0.8,H*0.25,70);
  grd.addColorStop(0,"rgba(255,220,50,0.9)");grd.addColorStop(1,"rgba(255,100,0,0)");
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Ground waves
  ctx.strokeStyle="rgba(139,90,43,0.7)";ctx.lineWidth=2;
  for(var i=0;i<4;i++){ctx.beginPath();ctx.moveTo(0,H*0.6+i*15+Math.sin(t*0.5+i)*5);for(var x=0;x<W;x+=10)ctx.lineTo(x,H*0.6+i*15+Math.sin(t*0.5+x*0.02+i)*5);ctx.stroke();}
  // Seeds
  drawParticles(ctx);
  // Compost bins
  drawBin(ctx,W*0.15,H*0.55,30,40,"#5d4037");
  drawBin(ctx,W*0.25,H*0.55,30,40,"#6d4c41");
  ctx.fillStyle="rgba(125,193,66,0.6)";ctx.font="bold 11px Arial";ctx.fillText("INPUT PREP",W*0.1,H*0.9);
}
function drawBin(ctx,x,y,w,h,c){
  ctx.fillStyle=c;ctx.fillRect(x,y,w,h);
  ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(x,y,w,5);
  ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}

function drawSowing(ctx,W,H,t){
  ctx.fillStyle="#0a2010";ctx.fillRect(0,0,W,H);
  // Sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,"#1a3a2a");sky.addColorStop(1,"#2d5a3a");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.5);
  // Rain drops
  ctx.strokeStyle="rgba(100,180,255,0.4)";ctx.lineWidth=1;
  for(var i=0;i<15;i++){var rx=(i*47+t*80)%W,ry=(i*31+t*120)%H;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-2,ry+10);ctx.stroke();}
  // Soil rows
  for(var i=0;i<5;i++){
    ctx.fillStyle=i%2===0?"#3e2723":"#4e342e";
    ctx.fillRect(0,H*0.55+i*14,W,7);
  }
  // Cotton seeds in ground
  for(var i=0;i<6;i++){
    var sx=W*0.1+i*(W*0.15),sy=H*0.58;
    ctx.fillStyle="#d4b896";ctx.beginPath();ctx.ellipse(sx,sy,5,3,0,0,Math.PI*2);ctx.fill();
    // tiny sprout
    if(i%2===0){ctx.strokeStyle="#4caf50";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy-3);ctx.lineTo(sx,sy-8+Math.sin(t*2+i)*2);ctx.stroke();}
  }
  ctx.fillStyle="rgba(125,193,66,0.8)";ctx.font="bold 11px Arial";ctx.fillText("SOWING SEASON",W*0.05,H*0.92);
  drawParticles(ctx);
}

function drawVegetative(ctx,W,H,t){
  ctx.fillStyle="#061506";ctx.fillRect(0,0,W,H);
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#0d2b0d");sky.addColorStop(1,"#1a4a1a");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Cotton plants growing
  for(var i=0;i<7;i++){
    var px=W*0.08+i*(W*0.13),ph=H*0.35+Math.sin(t*0.8+i*1.2)*8;
    drawCottonPlant(ctx,px,H*0.85,ph,t+i);
  }
  ctx.fillStyle="rgba(125,193,66,0.8)";ctx.font="bold 11px Arial";ctx.fillText("CROP GROWING",W*0.05,H*0.95);
  drawParticles(ctx);
}

function drawCottonPlant(ctx,x,baseY,height,t){
  ctx.strokeStyle="#33691e";ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x,baseY-height);ctx.stroke();
  // leaves
  for(var l=0;l<3;l++){
    var ly=baseY-height*0.3*(l+1);
    var ldir=l%2===0?1:-1;
    ctx.strokeStyle="#4caf50";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,ly);ctx.quadraticCurveTo(x+ldir*20,ly-8+Math.sin(t*0.5)*3,x+ldir*35,ly-5);ctx.stroke();
  }
}

function drawIPM(ctx,W,H,t){
  ctx.fillStyle="#100a20";ctx.fillRect(0,0,W,H);
  drawVegetative(ctx,W,H,t);
  // Pheromone trap
  var tx=W*0.75,ty=H*0.3;
  ctx.fillStyle="rgba(255,200,0,0.8)";ctx.fillRect(tx-12,ty,24,18);
  ctx.strokeStyle="#ffd600";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx,ty-25);ctx.stroke();
  // insects around trap
  for(var i=0;i<4;i++){
    var angle=t*1.5+i*(Math.PI/2);
    var ix=tx+Math.cos(angle)*20,iy=ty+Math.sin(angle)*15-5;
    ctx.fillStyle="rgba(255,100,0,0.7)";ctx.beginPath();ctx.arc(ix,iy,3,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle="rgba(255,150,0,0.8)";ctx.font="bold 11px Arial";ctx.fillText("IPM MONITORING",W*0.05,H*0.95);
}

function drawFlowering(ctx,W,H,t){
  ctx.fillStyle="#1a0f00";ctx.fillRect(0,0,W,H);
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#2d1a00");sky.addColorStop(1,"#1a3a1a");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(var i=0;i<6;i++){
    var px=W*0.08+i*(W*0.15);
    drawCottonPlant(ctx,px,H*0.85,H*0.45,t+i);
    // flower
    var fy=H*0.85-H*0.45-5;
    drawFlower(ctx,px,fy,t+i*0.5);
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(255,160,50,0.9)";ctx.font="bold 11px Arial";ctx.fillText("FLOWERING STAGE",W*0.05,H*0.95);
}

function drawFlower(ctx,x,y,t){
  var colors=["#ffeb3b","#ff9800","#fff9c4"];
  for(var p=0;p<5;p++){
    var angle=(p/5)*Math.PI*2+t*0.3;
    ctx.fillStyle=colors[p%colors.length];
    ctx.beginPath();ctx.ellipse(x+Math.cos(angle)*7,y+Math.sin(angle)*7,4,6,angle,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle="#ff6f00";ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
}

function drawBoll(ctx,W,H,t){
  ctx.fillStyle="#1a0510";ctx.fillRect(0,0,W,H);
  for(var i=0;i<6;i++){
    var px=W*0.08+i*(W*0.15);
    drawCottonPlant(ctx,px,H*0.85,H*0.5,t+i);
    // cotton boll
    var by=H*0.85-H*0.5-5;
    var bsize=6+Math.sin(t*0.5+i)*1.5;
    ctx.fillStyle="rgba(255,255,255,0.85)";ctx.beginPath();ctx.arc(px,by,bsize,0,Math.PI*2);ctx.fill();
    // boll segments
    ctx.strokeStyle="rgba(200,200,200,0.5)";ctx.lineWidth=0.5;
    for(var s=0;s<4;s++){var sa=(s/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px+Math.cos(sa)*bsize,by+Math.sin(sa)*bsize);ctx.stroke();}
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(255,180,200,0.9)";ctx.font="bold 11px Arial";ctx.fillText("BOLL DEVELOPMENT",W*0.05,H*0.95);
}

function drawHarvest(ctx,W,H,t){
  ctx.fillStyle="#0a0f1a";ctx.fillRect(0,0,W,H);
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#1a2a3a");sky.addColorStop(1,"#1a3a1a");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Cotton bales
  for(var b=0;b<3;b++){
    var bx=W*0.1+b*(W*0.28),by=H*0.55;
    ctx.fillStyle="#f5f5f5";ctx.fillRect(bx,by,W*0.2,H*0.28);
    ctx.strokeStyle="#bdbdbd";ctx.lineWidth=2;ctx.strokeRect(bx,by,W*0.2,H*0.28);
    // bale straps
    ctx.strokeStyle="#9e9e9e";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx+W*0.07,by);ctx.lineTo(bx+W*0.07,by+H*0.28);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+W*0.14,by);ctx.lineTo(bx+W*0.14,by+H*0.28);ctx.stroke();
    ctx.fillStyle="rgba(0,0,0,0.15)";ctx.font="9px Arial";ctx.fillText("ORGANIC",bx+4,by+H*0.15);
  }
  // floating cotton fluffs
  drawParticles(ctx);
  // farmer silhouette
  drawFarmer(ctx,W*0.85,H*0.75,t);
  ctx.fillStyle="rgba(200,220,255,0.9)";ctx.font="bold 11px Arial";ctx.fillText("COTTON HARVEST",W*0.05,H*0.95);
}

function drawFarmer(ctx,x,y,t){
  ctx.fillStyle="rgba(50,30,10,0.8)";
  ctx.beginPath();ctx.arc(x,y-30,8,0,Math.PI*2);ctx.fill();
  ctx.fillRect(x-6,y-22,12,20);
  // arm picking motion
  ctx.strokeStyle="rgba(50,30,10,0.8)";ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x+6,y-15);ctx.lineTo(x+18,y-10+Math.sin(t*2)*5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-6,y-15);ctx.lineTo(x-5,y+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-6,y-2);ctx.lineTo(x+6,y-2);ctx.stroke();
}

function drawRabi(ctx,W,H,t){
  ctx.fillStyle="#001a0f";ctx.fillRect(0,0,W,H);
  // wheat rows
  for(var i=0;i<8;i++){
    var px=W*0.05+i*(W*0.12);
    drawWheatStalk(ctx,px,H*0.85,H*0.4,t+i*0.3);
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(100,230,150,0.9)";ctx.font="bold 11px Arial";ctx.fillText("RABI SOWING",W*0.05,H*0.95);
}

function drawWinter(ctx,W,H,t){
  ctx.fillStyle="#0a0a20";ctx.fillRect(0,0,W,H);
  var sky=ctx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,"#0d0d2b");sky.addColorStop(1,"#1a1a3a");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.6);
  for(var i=0;i<8;i++){
    var px=W*0.05+i*(W*0.12);
    drawWheatStalk(ctx,px,H*0.85,H*0.35+Math.sin(t*0.5+i)*5,t+i*0.3);
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(180,200,255,0.9)";ctx.font="bold 11px Arial";ctx.fillText("WINTER CARE",W*0.05,H*0.95);
}

function drawMustard(ctx,W,H,t){
  ctx.fillStyle="#0f1a00";ctx.fillRect(0,0,W,H);
  for(var i=0;i<8;i++){
    var px=W*0.05+i*(W*0.12);
    // mustard stalk
    ctx.strokeStyle="#8bc34a";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px,H*0.85);ctx.lineTo(px,H*0.4+Math.sin(t*0.3+i)*5);ctx.stroke();
    // yellow flowers at top
    ctx.fillStyle="#ffee58";ctx.beginPath();ctx.arc(px,H*0.38+Math.sin(t*0.3+i)*5,6,0,Math.PI*2);ctx.fill();
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(255,220,50,0.9)";ctx.font="bold 11px Arial";ctx.fillText("MUSTARD FLOWERING",W*0.05,H*0.95);
}

function drawWheat(ctx,W,H,t){
  ctx.fillStyle="#1a1000";ctx.fillRect(0,0,W,H);
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#2a1a00");sky.addColorStop(1,"#1a3a00");
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(var i=0;i<10;i++){
    var px=W*0.04+i*(W*0.1);
    drawWheatStalk(ctx,px,H*0.85,H*0.45+Math.sin(t*0.4+i)*8,t+i*0.2);
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(255,200,50,0.9)";ctx.font="bold 11px Arial";ctx.fillText("WHEAT HARVEST",W*0.05,H*0.95);
}

function drawWheatStalk(ctx,x,baseY,height,t){
  ctx.strokeStyle="#8d6e63";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,baseY);
  ctx.quadraticCurveTo(x+Math.sin(t*0.4)*8,baseY-height*0.5,x+Math.sin(t*0.4)*5,baseY-height);
  ctx.stroke();
  // wheat head
  var tx=x+Math.sin(t*0.4)*5,ty=baseY-height;
  ctx.fillStyle="#ffd54f";
  for(var g=0;g<5;g++){ctx.beginPath();ctx.ellipse(tx+(g%2===0?-3:3),ty+g*4,2,4,0.3*(g%2===0?1:-1),0,Math.PI*2);ctx.fill();}
}

function drawReview(ctx,W,H,t){
  ctx.fillStyle="#1a1000";ctx.fillRect(0,0,W,H);
  // Documents / calendar
  for(var d=0;d<3;d++){
    var dx=W*0.15+d*(W*0.27),dy=H*0.2;
    ctx.fillStyle="rgba(255,248,220,0.85)";ctx.fillRect(dx,dy,W*0.2,H*0.45);
    ctx.strokeStyle="rgba(200,160,0,0.6)";ctx.lineWidth=1.5;ctx.strokeRect(dx,dy,W*0.2,H*0.45);
    // lines on doc
    ctx.strokeStyle="rgba(100,80,0,0.4)";ctx.lineWidth=1;
    for(var l=0;l<5;l++){ctx.beginPath();ctx.moveTo(dx+5,dy+15+l*10);ctx.lineTo(dx+W*0.2-5,dy+15+l*10);ctx.stroke();}
    // checkmark
    ctx.strokeStyle="rgba(0,150,0,0.8)";ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(dx+8,dy+H*0.45-12);ctx.lineTo(dx+14,dy+H*0.45-6);ctx.lineTo(dx+W*0.2-5,dy+H*0.45-18);ctx.stroke();
  }
  drawParticles(ctx);
  ctx.fillStyle="rgba(255,200,50,0.9)";ctx.font="bold 11px Arial";ctx.fillText("ANNUAL REVIEW",W*0.05,H*0.95);
}

var cur=0;
var openState={};
var raf=null;
var animT=0;

function go(i){
  if(i<0||i>=months.length)return;
  cur=i;
  draw();
  window.scrollTo(0,0);
}

function toggleCard(idx){
  var key=cur+"-"+idx;
  openState[key]=openState[key]?false:true;
  var bd=document.getElementById("bd"+idx);
  var ar=document.getElementById("ar"+idx);
  if(openState[key]){bd.style.display="block";ar.innerHTML="&#9650;";}
  else{bd.style.display="none";ar.innerHTML="&#9660;";}
}

function startAnim(themeName){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  var canvas=document.getElementById("heroCanvas");
  var W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W;canvas.height=H;
  var th=themes[themeName]||themes["sowing"];
  initParticles(themeName,W,H);
  animT=0;
  function loop(){
    animT+=0.016;
    var ctx=canvas.getContext("2d");
    th.draw(ctx,W,H,animT);
    updateParticles(W,H);
    raf=requestAnimationFrame(loop);
  }
  loop();
}

function draw(){
  var mn=months[cur];

  // Tabs
  var bar="";
  for(var i=0;i<months.length;i++){
    var active=i===cur;
    var st=active?"background:"+months[i].a+";border-color:"+months[i].a+";color:#fff;font-weight:bold;":"";
    bar+='<span class="mBtn" style="'+st+'" onclick="go('+i+')">'+months[i].e+" "+months[i].m+'</span>';
  }
  document.getElementById("monthBar").innerHTML=bar;
  setTimeout(function(){var btns=document.querySelectorAll(".mBtn");if(btns[cur])btns[cur].scrollIntoView({inline:"center"});},80);

  // Hero animation
  startAnim(mn.theme);
  document.getElementById("hMonth").innerHTML=mn.e+" "+mn.m;
  document.getElementById("hSeason").innerHTML=mn.s;
  document.getElementById("heroBadge").innerHTML=mn.b;
  document.getElementById("heroBadge").style.background=mn.a;

  // Cards
  var html="";
  for(var i=0;i<mn.t.length;i++){
    var t=mn.t[i];
    var isOpen=openState[cur+"-"+i]?true:false;
    var items="";
    for(var j=0;j<t.i.length;j++){
      items+='<div class="item"><div class="bullet" style="background:'+t.c+'"></div><p>'+t.i[j]+'</p></div>';
    }
    html+='<div class="card">';
    html+='<button class="cardHead" style="background:'+mn.bg+'" onclick="toggleCard('+i+')">';
    html+='<span class="tag" style="background:'+t.c+'">'+t.tg+'</span>';
    html+='<span class="cardTitle">'+t.h+'</span>';
    html+='<span class="arrow" id="ar'+i+'">'+(isOpen?"&#9650;":"&#9660;")+'</span>';
    html+='</button>';
    html+='<div class="cardBody" id="bd'+i+'" style="display:'+(isOpen?"block":"none")+'">'+items+'</div>';
    html+='</div>';
  }
  document.getElementById("cards").innerHTML=html;

  var pb=document.getElementById("pBtn");
  var nb=document.getElementById("nBtn");
  pb.disabled=cur===0;
  pb.innerHTML=cur>0?"&#8592; "+months[cur-1].e+" "+months[cur-1].m:"&#8592; Prev";
  nb.disabled=cur===months.length-1;
  nb.innerHTML=cur<months.length-1?months[cur+1].e+" "+months[cur+1].m+" &#8594;":"Next &#8594;";
  document.getElementById("pg").innerHTML=(cur+1)+" / "+months.length;
}

draw();
</script>
</body>
</html>
