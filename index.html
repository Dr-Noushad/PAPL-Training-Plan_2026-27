<title>PAPL Farmer Training Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0a1f0a;color:#222;}

/* HEADER */
#header{background:linear-gradient(135deg,#1b4332,#2d6a4f);padding:14px 12px;text-align:center;border-bottom:3px solid #52b788;}
#header h1{color:#7dc142;font-size:19px;font-weight:900;letter-spacing:.5px;}
#header p{color:#b7e4c7;font-size:10px;letter-spacing:2px;margin-top:2px;}
#header h2{color:#fff;font-size:14px;margin:7px 0 2px;}
#header small{color:#95d5b2;font-size:10px;}

/* TOP BAR */
#topBar{background:#071407;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #1a3a1a;flex-wrap:wrap;gap:6px;}
.langBtn{padding:6px 14px;border-radius:20px;border:2px solid #52b788;background:transparent;color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:all .2s;}
.langBtn.on{background:#52b788;color:#071407;}
.navTabs{display:flex;gap:5px;}
.navTab{padding:6px 12px;border-radius:7px;border:2px solid transparent;background:rgba(255,255,255,.08);color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:all .2s;}
.navTab.on{background:#2e7d32;color:#fff;border-color:#52b788;}

/* MONTH BAR */
#monthBar{background:#071407;padding:8px 6px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;border-bottom:2px solid #1a3a1a;}
#monthBar::-webkit-scrollbar{display:none;}
.mBtn{display:inline-block;padding:7px 11px;margin:0 2px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,.08);color:#95d5b2;font-size:11px;cursor:pointer;transition:all .25s;white-space:nowrap;}
.mBtn:active{transform:scale(.95);}

/* MAIN */
#main{padding:10px;max-width:700px;margin:0 auto;}

/* HERO */
#heroWrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:12px;height:210px;background:#1a3a1a;}
#heroWrap.animOut{animation:slideOut .35s ease forwards;}
#heroWrap.animIn{animation:slideIn .35s ease forwards;}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.heroImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .5s;}
.heroOverlay{position:absolute;inset:0;}
.heroGrid{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;}
.heroGrid img{width:100%;height:100%;object-fit:cover;opacity:.85;}
.heroGrad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.3) 50%,transparent 100%);}
.heroInfo{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;}
.heroInfo h3{color:#fff;font-size:21px;font-weight:900;margin:0;text-shadow:1px 2px 6px rgba(0,0,0,.9);}
.heroInfo span{color:rgba(255,255,255,.88);font-size:12px;display:block;margin-top:2px;}
#heroBadge{float:right;color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:bold;border:1px solid rgba(255,255,255,.5);backdrop-filter:blur(4px);background:rgba(0,0,0,.45);}

/* PHOTO STRIP */
.photoStrip{display:flex;gap:4px;margin-bottom:10px;height:64px;border-radius:8px;overflow:hidden;}
.photoStrip img{flex:1;object-fit:cover;border-radius:4px;min-width:0;}

/* CARDS */
.card{background:#fff;border-radius:9px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.cardHead{width:100%;padding:12px;border:none;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;transition:filter .15s;}
.cardHead:active{filter:brightness(.93);}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;color:#fff;font-size:10px;font-weight:bold;white-space:nowrap;flex-shrink:0;}
.cardTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.35;}
.arrow{font-size:13px;color:#555;flex-shrink:0;margin-left:4px;}
.cardBody{display:none;padding:8px 13px 13px;border-top:1px solid #eee;}
.item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;align-items:flex-start;}
.item:last-child{border-bottom:none;}
.dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.item p{margin:0;font-size:13px;color:#333;line-height:1.55;}
.resBtn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;background:#1b5e20;color:#fff;border-radius:7px;font-size:12px;font-weight:bold;text-decoration:none;border:none;cursor:pointer;font-family:Arial,sans-serif;}
.resBtn:active{background:#2e7d32;}

/* MODULE VIEW */
#moduleRef{display:none;}
.modCard{background:#fff;border-radius:9px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.modHead{width:100%;padding:12px;border:none;background:#f7f7f7;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:Arial,sans-serif;}
.modHead:active{filter:brightness(.95);}
.modNum{width:38px;height:38px;border-radius:50%;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.3;}
.modBody{display:none;padding:10px 14px 13px;border-top:1px solid #eee;}
.subList{list-style:none;}
.subList li{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px;color:#333;line-height:1.5;}
.subList li:last-child{border-bottom:none;}

/* NAV */
#navRow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.navBtn{flex:1;padding:13px 6px;background:#1b5e20;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:background .2s;}
.navBtn:active{background:#2e7d32;}
.navBtn:disabled{background:#2a3a2a;color:#556655;}
#pg{text-align:center;font-size:12px;color:#95d5b2;white-space:nowrap;font-weight:bold;}

#foot{text-align:center;padding:14px;color:#52b788;font-size:10px;letter-spacing:2px;margin-top:4px;}
</style>
</head>

function setLang(l,btn){
  lang=l; cur=0; openState={};
  document.querySelectorAll(".langBtn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  renderAll();
}

function setView(v){
  view=v;
  document.getElementById("tabCal").classList.toggle("on",v==="cal");
  document.getElementById("tabMod").classList.toggle("on",v==="mod");
  document.getElementById("calView").style.display=v==="cal"?"block":"none";
  document.getElementById("moduleRef").style.display=v==="mod"?"block":"none";
  document.getElementById("monthBar").style.display=v==="cal"?"block":"none";
  var d=DATA[lang];
  document.getElementById("tabCal").textContent=d.tabCal;
  document.getElementById("tabMod").textContent=d.tabMod;
  if(v==="mod") renderModules();
}

function go(i){
  if(i<0||i>=DATA[lang].months.length) return;
  var hw=document.getElementById("heroWrap");
  hw.className="animOut";
  setTimeout(function(){
    cur=i; openState={};
    renderCalendar();
    hw.className="animIn";
    setTimeout(function(){hw.className="";},380);
  },340);
  window.scrollTo(0,0);
}

function toggleCard(idx){
  var k=cur+"-"+idx;
  openState[k]=!openState[k];
  document.getElementById("bd"+idx).style.display=openState[k]?"block":"none";
  document.getElementById("ar"+idx).innerHTML=openState[k]?"&#9650;":"&#9660;";
}

function toggleMod(idx){
  modOpen[idx]=!modOpen[idx];
  document.getElementById("mbd"+idx).style.display=modOpen[idx]?"block":"none";
  document.getElementById("mar"+idx).innerHTML=modOpen[idx]?"&#9650;":"&#9660;";
}

function renderAll(){
  var d=DATA[lang];
  document.getElementById("calTitle").textContent=d.calTitle;
  document.getElementById("calSub").textContent=d.calSub;
  document.getElementById("tabCal").textContent=d.tabCal;
  document.getElementById("tabMod").textContent=d.tabMod;
  document.getElementById("footTxt").textContent=d.foot;
  if(view==="cal") renderCalendar();
  else renderModules();
}

function renderCalendar(){
  var d=DATA[lang], ms=d.months, mn=ms[cur];
  var tk=THEMEKEYS[cur];
  var imgs=IMG[tk]||IMG["june"];
  var grad=GRADIENTS[tk]||GRADIENTS["june"];

  // Month bar
  var bar="";
  for(var i=0;i<ms.length;i++){
    var ac=i===cur;
    var g=GRADIENTS[THEMEKEYS[i]];
    var st=ac?"background:"+g+";border-color:transparent;color:#fff;font-weight:bold;":"";
    bar+='<span class="mBtn" style="'+st+'" onclick="go('+i+')">'+ms[i].e+" "+ms[i].m+'</span>';
  }
  document.getElementById("monthBar").innerHTML=bar;
  setTimeout(function(){var b=document.querySelectorAll(".mBtn");if(b[cur])b[cur].scrollIntoView({inline:"center"});},60);

  // Hero: 4-grid images
  var grid="";
  for(var i=0;i<4;i++) grid+='<img src="'+imgs[i]+'" alt="" onerror="this.style.background=\''+grad+'\';this.src=\'\'"/>';
  document.getElementById("heroGrid").innerHTML=grid;
  document.getElementById("heroWrap").style.background=grad;
  document.getElementById("hMonth").innerHTML=mn.e+" "+mn.m;
  document.getElementById("hSeason").textContent=mn.s;
  document.getElementById("heroBadge").textContent=mn.b;
  document.getElementById("heroBadge").style.background=grad.split(",")[1]||"#2e7d32";

  // Photo strip (2 extra images)
  var strip='<img src="'+imgs[0]+'" alt=""/><img src="'+imgs[2]+'" alt=""/><img src="'+imgs[1]+'" alt=""/>';
  document.getElementById("photoStrip").style.background=grad;
  document.getElementById("photoStrip").innerHTML=strip;

  // Cards
  var html="";
  for(var i=0;i<mn.t.length;i++){
    var t=mn.t[i], op=openState[cur+"-"+i]||false, items="";
    for(var j=0;j<t.i.length;j++) items+='<div class="item"><div class="dot" style="background:'+t.c+'"></div><p>'+t.i[j]+'</p></div>';
    html+='<div class="card"><button class="cardHead" style="background:'+mn.bg+'" onclick="toggleCard('+i+')"><span class="tag" style="background:'+t.c+'">'+t.tg+'</span><span class="cardTitle">'+t.h+'</span><span class="arrow" id="ar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span></button><div class="cardBody" id="bd'+i+'" style="display:'+(op?"block":"none")+'">'+items+'</div></div>';
  }
  document.getElementById("cards").innerHTML=html;

  // Nav
  var pb=document.getElementById("pBtn"),nb=document.getElementById("nBtn");
  pb.disabled=cur===0; nb.disabled=cur===ms.length-1;
  document.getElementById("pLbl").textContent=cur>0?ms[cur-1].e+" "+ms[cur-1].m:d.prev;
  document.getElementById("nLbl").textContent=cur<ms.length-1?ms[cur+1].e+" "+ms[cur+1].m:d.next;
  document.getElementById("pg").innerHTML='<span style="color:#7dc142">●</span> '+(cur+1)+" / "+ms.length+' <span style="color:#7dc142">●</span>';
}

function renderModules(){
  var mods=DATA[lang].modules;
  var html="";
  for(var i=0;i<mods.length;i++){
    var m=mods[i], op=modOpen[i]||false, items="";
    for(var j=0;j<m.subs.length;j++) items+='<li><span class="dot" style="background:'+m.color+';margin-top:5px;flex-shrink:0;width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:8px;"></span>'+m.subs[j]+'</li>';
    var driveLink=DRIVE_LINKS[m.num];
    var resBtn=driveLink?'<a class="resBtn" href="'+driveLink+'" target="_blank">📁 '+(lang==="hi"?"प्रशिक्षण सामग्री खोलें":"Open Training Resources")+'</a>':'<span style="font-size:11px;color:#aaa;font-style:italic">📁 '+(lang==="hi"?"संसाधन शीघ्र आ रहे हैं":"Resources coming soon")+'</span>';
    html+='<div class="modCard"><button class="modHead" style="background:linear-gradient(135deg,'+m.color+'22,'+m.color+'11)" onclick="toggleMod('+i+')"><div class="modNum" style="background:'+m.color+'">'+m.num+'</div><span class="modTitle">'+m.title+'</span><span class="arrow" id="mar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span></button><div class="modBody" id="mbd'+i+'" style="display:'+(op?"block":"none")+'"><ul class="subList">'+items+'</ul><div style="margin-top:10px;">'+resBtn+'</div></div></div>';
  }
  document.getElementById("moduleRef").innerHTML=html;
}

renderAll();
