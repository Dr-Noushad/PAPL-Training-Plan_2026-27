*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0d2b0d;color:#222;}
/* HEADER */

.langBtn.active{background:#52b788;color:#0a1a0a;}
.navTabs{display:flex;gap:6px;}
.navTab{padding:6px 14px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,0.08);color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:all 0.2s;}
.navTab.active{background:#2e7d32;color:#fff;border-color:#52b788;}
/* MONTH BAR */
#monthBar{background:#0a1a0a;padding:8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;border-bottom:1px solid #1a3a1a;}
#monthBar::-webkit-scrollbar{display:none;}
.mBtn{display:inline-block;padding:7px 11px;margin:0 2px;border-radius:7px;border:2px solid transparent;background:rgba(255,255,255,0.08);color:#95d5b2;font-size:11px;cursor:pointer;}
/* MAIN */
#main{padding:10px;max-width:700px;margin:0 auto;}
/* HERO CANVAS */
#heroBox{border-radius:10px;overflow:hidden;margin-bottom:10px;position:relative;height:175px;}
#heroCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.heroOv{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.72));}
.heroOv h3{color:#fff;font-size:19px;margin:0;text-shadow:1px 1px 3px #000;}
.heroOv span{color:rgba(255,255,255,.85);font-size:12px;}
#heroBadge{float:right;color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:bold;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,0.45);}
/* CARDS */
.card{background:#fff;border-radius:8px;margin-bottom:8px;overflow:hidden;}
.cardHead{width:100%;padding:11px 12px;border:none;background:#f5f5f5;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;}
.cardHead:active{background:#e8e8e8;}
.tag{display:inline-block;padding:3px 7px;border-radius:5px;color:#fff;font-size:10px;font-weight:bold;white-space:nowrap;}
.cardTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.3;}
.arrow{font-size:13px;color:#555;margin-left:4px;flex-shrink:0;}
.cardBody{display:none;padding:8px 12px 12px;}
.item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #e8e8e8;align-items:flex-start;}
.item:last-child{border-bottom:none;}
.bullet{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.item p{margin:0;font-size:13px;color:#333;line-height:1.5;}
/* MODULE REFERENCE */
#moduleRef{display:none;}
.modSection{background:#fff;border-radius:10px;margin-bottom:10px;overflow:hidden;}
.modHeader{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border:none;width:100%;text-align:left;font-family:Arial,sans-serif;}
.modNum{display:inline-block;width:36px;height:36px;border-radius:50%;color:#fff;font-size:13px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modTitle{font-size:14px;font-weight:bold;color:#111;flex:1;margin-left:10px;line-height:1.3;}
.modBody{display:none;padding:10px 14px 14px;border-top:1px solid #eee;}
.subList{list-style:none;padding:0;}
.subList li{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;align-items:flex-start;font-size:13px;color:#333;line-height:1.5;}
.subList li:last-child{border-bottom:none;}
.subDot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}

#navRow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.navBtn{flex:1;padding:12px 6px;background:#1b5e20;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;}

#pg{text-align:center;font-size:12px;color:#95d5b2;white-space:nowrap;}
#foot{text-align:center;padding:14px;color:#52b788;font-size:10px;letter-spacing:2px;}

  {num:"10D",title:"गर्भवती और स्तनपान कराने वाली महिलाओं का संरक्षण",color:"#e65100",subs:["गर्भावस्था के दौरान भारी काम से बचें","सुरक्षित कार्य स्थिति","आराम और स्वास्थ्य देखभाल का महत्व","सहायक पारिवारिक प्रथाएं"]},
  {num:"10E",title:"उचित मजदूरी और श्रम अधिकार",color:"#bf360c",subs:["समय पर मजदूरी भुगतान","समान काम के लिए समान मजदूरी","कोई बंधुआ मजदूरी नहीं","कोई जबरन मजदूरी नहीं","पारदर्शी श्रम भुगतान प्रणाली"]},
  {num:"10F",title:"खेत पर स्वास्थ्य और सुरक्षा",color:"#2e7d32",subs:["कृषि उपकरणों का सुरक्षित उपयोग","पेयजल उपलब्धता","प्राथमिक चिकित्सा जागरूकता","व्यक्तिगत स्वच्छता","काम के दौरान छाया और आराम","गर्मी तनाव रोकथाम","कृषि इनपुट का सुरक्षित भंडारण"]},

 ]

// ===================== ANIMATIONS =====================
var themes={summer:drawSummer,sowing:drawSowing,vegetative:drawVegetative,ipm:drawIPM,flowering:drawFlowering,boll:drawBoll,harvest:drawHarvest,rabi:drawRabi,winter:drawWinter,mustard:drawMustard,wheat:drawWheat,review:drawReview};
function initP(th,W,H){particles=[];var n=18;for(var i=0;i<n;i++){var c="rgba(125,193,66,0.5)";if(th==="flowering")c=i%2?"rgba(255,160,0,0.7)":"rgba(255,100,0,0.6)";else if(th==="harvest"||th==="boll")c="rgba(255,255,255,"+(Math.random()*0.5+0.3)+")";else if(th==="rabi"||th==="winter")c="rgba(200,230,255,0.4)";else if(th==="mustard"||th==="wheat"||th==="review")c="rgba(255,200,0,0.5)";particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*4+1.5,vy:(Math.random()-0.5)*0.6,vx:(Math.random()-0.5)*0.5,c:c});}}
function updP(W,H){for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;if(p.y>H+8)p.y=-8;if(p.y<-8)p.y=H+8;if(p.x<-8)p.x=W+8;if(p.x>W+8)p.x=-8;}}
function drwP(ctx){for(var i=0;i<particles.length;i++){var p=particles[i];ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle=p.c;ctx.fill();}}
function plant(ctx,x,y,h,t){ctx.strokeStyle="#33691e";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-h);ctx.stroke();for(var l=0;l<3;l++){var ly=y-h*0.3*(l+1),d=l%2?1:-1;ctx.strokeStyle="#4caf50";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x,ly);ctx.quadraticCurveTo(x+d*18,ly-7+Math.sin(t*0.5)*3,x+d*30,ly-4);ctx.stroke();}}
function flower(ctx,x,y,t){for(var p=0;p<5;p++){var a=(p/5)*6.28+t*0.3;ctx.fillStyle=p%2?"#ffeb3b":"#ff9800";ctx.beginPath();ctx.ellipse(x+Math.cos(a)*7,y+Math.sin(a)*7,4,6,a,0,6.28);ctx.fill();}ctx.fillStyle="#ff6f00";ctx.beginPath();ctx.arc(x,y,4,0,6.28);ctx.fill();}
function wheat(ctx,x,y,h,t){ctx.strokeStyle="#8d6e63";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+Math.sin(t*0.4)*7,y-h*0.5,x+Math.sin(t*0.4)*5,y-h);ctx.stroke();var tx=x+Math.sin(t*0.4)*5,ty=y-h;ctx.fillStyle="#ffd54f";for(var g=0;g<5;g++){ctx.beginPath();ctx.ellipse(tx+(g%2?-3:3),ty+g*4,2,4,0.3*(g%2?1:-1),0,6.28);ctx.fill();}}
function farmer(ctx,x,y,t){ctx.fillStyle="rgba(50,30,10,0.85)";ctx.beginPath();ctx.arc(x,y-28,7,0,6.28);ctx.fill();ctx.fillRect(x-5,y-21,10,18);ctx.strokeStyle="rgba(50,30,10,0.85)";ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x+5,y-14);ctx.lineTo(x+16,y-10+Math.sin(t*2)*5);ctx.stroke();}
function drawSummer(ctx,W,H,t){ctx.fillStyle="#2d1200";ctx.fillRect(0,0,W,H);var g=ctx.createRadialGradient(W*.8,H*.25,5,W*.8,H*.25,65);g.addColorStop(0,"rgba(255,220,50,.9)");g.addColorStop(1,"rgba(255,100,0,0)");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle="rgba(139,90,43,.6)";ctx.lineWidth=1.5;for(var i=0;i<4;i++){ctx.beginPath();ctx.moveTo(0,H*.62+i*13+Math.sin(t*.5+i)*4);for(var x=0;x<W;x+=8)ctx.lineTo(x,H*.62+i*13+Math.sin(t*.5+x*.02+i)*4);ctx.stroke();}drwP(ctx);ctx.fillStyle="rgba(125,193,66,.7)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"बीज तैयारी":"SEED PREP",W*.06,H*.92);}
function drawSowing(ctx,W,H,t){ctx.fillStyle="#0a2010";ctx.fillRect(0,0,W,H);ctx.strokeStyle="rgba(100,180,255,.35)";ctx.lineWidth=1;for(var i=0;i<12;i++){var rx=(i*51+t*75)%W,ry=(i*37+t*110)%H;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-2,ry+9);ctx.stroke();}for(var i=0;i<5;i++){ctx.fillStyle=i%2?"#3e2723":"#4e342e";ctx.fillRect(0,H*.56+i*13,W,7);}for(var i=0;i<6;i++){var sx=W*.1+i*(W*.15),sy=H*.59;ctx.fillStyle="#d4b896";ctx.beginPath();ctx.ellipse(sx,sy,5,3,0,0,6.28);ctx.fill();if(i%2===0){ctx.strokeStyle="#4caf50";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(sx,sy-3);ctx.lineTo(sx,sy-8+Math.sin(t*2+i)*2);ctx.stroke();}}drwP(ctx);ctx.fillStyle="rgba(125,193,66,.85)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"बुवाई सीजन":"SOWING",W*.06,H*.93);}
function drawVegetative(ctx,W,H,t){ctx.fillStyle="#061506";ctx.fillRect(0,0,W,H);var s=ctx.createLinearGradient(0,0,0,H);s.addColorStop(0,"#0d2b0d");s.addColorStop(1,"#1a4a1a");ctx.fillStyle=s;ctx.fillRect(0,0,W,H);for(var i=0;i<7;i++)plant(ctx,W*.08+i*(W*.13),H*.85,H*.35+Math.sin(t*.8+i*1.2)*7,t+i);drwP(ctx);ctx.fillStyle="rgba(125,193,66,.85)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"फसल बढ़ रही है":"CROP GROWING",W*.06,H*.95);}
function drawIPM(ctx,W,H,t){drawVegetative(ctx,W,H,t);var tx=W*.76,ty=H*.28;ctx.fillStyle="rgba(255,200,0,.8)";ctx.fillRect(tx-11,ty,22,16);ctx.strokeStyle="#ffd600";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx,ty-22);ctx.stroke();for(var i=0;i<4;i++){var a=t*1.5+i*1.57;ctx.fillStyle="rgba(255,80,0,.7)";ctx.beginPath();ctx.arc(tx+Math.cos(a)*18,ty+Math.sin(a)*13-4,3,0,6.28);ctx.fill();}ctx.fillStyle="rgba(255,150,0,.85)";ctx.font="bold 10px Arial";ctx.fillText("IPM",W*.06,H*.95);}
function drawFlowering(ctx,W,H,t){ctx.fillStyle="#1a0f00";ctx.fillRect(0,0,W,H);for(var i=0;i<6;i++){var px=W*.08+i*(W*.15);plant(ctx,px,H*.85,H*.45,t+i);flower(ctx,px,H*.85-H*.45-5,t+i*.5);}drwP(ctx);ctx.fillStyle="rgba(255,160,50,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"फूल अवस्था":"FLOWERING",W*.06,H*.95);}
function drawBoll(ctx,W,H,t){ctx.fillStyle="#1a0510";ctx.fillRect(0,0,W,H);for(var i=0;i<6;i++){var px=W*.08+i*(W*.15);plant(ctx,px,H*.85,H*.5,t+i);var by=H*.85-H*.5-5,bs=6+Math.sin(t*.5+i)*1.5;ctx.fillStyle="rgba(255,255,255,.88)";ctx.beginPath();ctx.arc(px,by,bs,0,6.28);ctx.fill();ctx.strokeStyle="rgba(180,180,180,.4)";ctx.lineWidth=.5;for(var s=0;s<4;s++){var sa=(s/4)*6.28;ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px+Math.cos(sa)*bs,by+Math.sin(sa)*bs);ctx.stroke();}}drwP(ctx);ctx.fillStyle="rgba(255,180,200,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"बॉल विकास":"BOLL DEV",W*.06,H*.95);}
function drawHarvest(ctx,W,H,t){ctx.fillStyle="#0a0f1a";ctx.fillRect(0,0,W,H);for(var b=0;b<3;b++){var bx=W*.1+b*(W*.28),by=H*.54;ctx.fillStyle="#f5f5f5";ctx.fillRect(bx,by,W*.2,H*.3);ctx.strokeStyle="#bdbdbd";ctx.lineWidth=1.5;ctx.strokeRect(bx,by,W*.2,H*.3);ctx.strokeStyle="#9e9e9e";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+W*.07,by);ctx.lineTo(bx+W*.07,by+H*.3);ctx.stroke();ctx.beginPath();ctx.moveTo(bx+W*.14,by);ctx.lineTo(bx+W*.14,by+H*.3);ctx.stroke();ctx.fillStyle="rgba(0,0,0,.15)";ctx.font="8px Arial";ctx.fillText(lang==="hi"?"जैविक":"ORGANIC",bx+4,by+H*.16);}drwP(ctx);farmer(ctx,W*.86,H*.76,t);ctx.fillStyle="rgba(200,220,255,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"कपास कटाई":"COTTON HARVEST",W*.06,H*.95);}
function drawRabi(ctx,W,H,t){ctx.fillStyle="#001a0f";ctx.fillRect(0,0,W,H);for(var i=0;i<8;i++)wheat(ctx,W*.05+i*(W*.12),H*.85,H*.4,t+i*.3);drwP(ctx);ctx.fillStyle="rgba(100,230,150,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"रबी बुवाई":"RABI SOWING",W*.06,H*.95);}
function drawWinter(ctx,W,H,t){ctx.fillStyle="#0a0a20";ctx.fillRect(0,0,W,H);for(var i=0;i<8;i++)wheat(ctx,W*.05+i*(W*.12),H*.85,H*.35+Math.sin(t*.5+i)*5,t+i*.3);drwP(ctx);ctx.fillStyle="rgba(180,200,255,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"शीतकालीन देखभाल":"WINTER CARE",W*.06,H*.95);}
function drawMustard(ctx,W,H,t){ctx.fillStyle="#0f1a00";ctx.fillRect(0,0,W,H);for(var i=0;i<8;i++){var px=W*.05+i*(W*.12);ctx.strokeStyle="#8bc34a";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(px,H*.85);ctx.lineTo(px,H*.4+Math.sin(t*.3+i)*5);ctx.stroke();ctx.fillStyle="#ffee58";ctx.beginPath();ctx.arc(px,H*.38+Math.sin(t*.3+i)*5,6,0,6.28);ctx.fill();}drwP(ctx);ctx.fillStyle="rgba(255,220,50,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"सरसों फूल":"MUSTARD FLOWER",W*.06,H*.95);}
function drawWheat(ctx,W,H,t){ctx.fillStyle="#1a1000";ctx.fillRect(0,0,W,H);for(var i=0;i<10;i++)wheat(ctx,W*.04+i*(W*.1),H*.85,H*.45+Math.sin(t*.4+i)*8,t+i*.2);drwP(ctx);ctx.fillStyle="rgba(255,200,50,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"गेहूं कटाई":"WHEAT HARVEST",W*.06,H*.95);}
function drawReview(ctx,W,H,t){ctx.fillStyle="#1a1000";ctx.fillRect(0,0,W,H);for(var d=0;d<3;d++){var dx=W*.15+d*(W*.27),dy=H*.18;ctx.fillStyle="rgba(255,248,220,.88)";ctx.fillRect(dx,dy,W*.2,H*.48);ctx.strokeStyle="rgba(200,160,0,.55)";ctx.lineWidth=1.2;ctx.strokeRect(dx,dy,W*.2,H*.48);for(var l=0;l<5;l++){ctx.strokeStyle="rgba(100,80,0,.35)";ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(dx+5,dy+14+l*10);ctx.lineTo(dx+W*.2-5,dy+14+l*10);ctx.stroke();}ctx.strokeStyle="rgba(0,150,0,.85)";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(dx+7,dy+H*.48-12);ctx.lineTo(dx+13,dy+H*.48-6);ctx.lineTo(dx+W*.2-4,dy+H*.48-18);ctx.stroke();}drwP(ctx);ctx.fillStyle="rgba(255,200,50,.9)";ctx.font="bold 10px Arial";ctx.fillText(lang==="hi"?"वार्षिक समीक्षा":"ANNUAL REVIEW",W*.06,H*.95);}

function startAnim(th){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  var cv=document.getElementById("heroCanvas");
  if(!cv)return;
  var W=cv.offsetWidth,H=cv.offsetHeight;
  cv.width=W;cv.height=H;
  var fn=themes[th]||themes["sowing"];
  initP(th,W,H);animT=0;
  function loop(){animT+=.016;var ctx=cv.getContext("2d");fn(ctx,W,H,animT);updP(W,H);raf=requestAnimationFrame(loop);}
  loop();
}

// ===================== RENDER =====================
function setLang(l){
  lang=l;
  document.querySelectorAll(".langBtn").forEach(function(b){b.classList.remove("active");});
  event.target.classList.add("active");
  cur=0; openState={}; modOpen={};
  renderAll();
}

function setView(v){
  view=v;
  document.getElementById("tabCal").classList.toggle("active",v==="calendar");
  document.getElementById("tabMod").classList.toggle("active",v==="modules");
  document.getElementById("calView").style.display=v==="calendar"?"block":"none";
  document.getElementById("moduleRef").style.display=v==="modules"?"block":"none";
  document.getElementById("monthBar").style.display=v==="calendar"?"block":"none";
  if(v==="calendar") startAnim(data[lang].months[cur].theme);
  else{if(raf){cancelAnimationFrame(raf);raf=null;} renderModules();}
  var d=data[lang];
  document.getElementById("tabCal").textContent=d.tabCal;
  document.getElementById("tabMod").textContent=d.tabMod;
}

function go(i){if(i<0||i>=data[lang].months.length)return;cur=i;openState={};renderCalendar();window.scrollTo(0,0);}

function toggleCard(idx){var k=cur+"-"+idx;openState[k]=!openState[k];var bd=document.getElementById("bd"+idx),ar=document.getElementById("ar"+idx);bd.style.display=openState[k]?"block":"none";ar.innerHTML=openState[k]?"&#9650;":"&#9660;";}

function toggleMod(idx){modOpen[idx]=!modOpen[idx];var bd=document.getElementById("mbd"+idx),ar=document.getElementById("mar"+idx);bd.style.display=modOpen[idx]?"block":"none";ar.innerHTML=modOpen[idx]?"&#9650;":"&#9660;";}

function renderAll(){
  var d=data[lang];
  document.getElementById("calTitle").textContent=d.calTitle;
  document.getElementById("calSub").textContent=d.calSub;
  document.getElementById("tabCal").textContent=d.tabCal;
  document.getElementById("tabMod").textContent=d.tabMod;
  document.getElementById("footTxt").textContent=d.foot;
  if(view==="calendar") renderCalendar();
  else renderModules();
}

function renderCalendar(){
  var d=data[lang], ms=d.months, mn=ms[cur];
  // Month bar
  var bar="";
  for(var i=0;i<ms.length;i++){var ac=i===cur,st=ac?"background:"+ms[i].a+";border-color:"+ms[i].a+";color:#fff;font-weight:bold;":"";bar+='<span class="mBtn" style="'+st+'" onclick="go('+i+')">'+ms[i].e+" "+ms[i].m+'</span>';}
  document.getElementById("monthBar").innerHTML=bar;
  setTimeout(function(){var b=document.querySelectorAll(".mBtn");if(b[cur])b[cur].scrollIntoView({inline:"center"});},60);
  // Hero
  startAnim(mn.theme);
  document.getElementById("hMonth").innerHTML=mn.e+" "+mn.m;
  document.getElementById("hSeason").textContent=mn.s;
  document.getElementById("heroBadge").textContent=mn.b;
  document.getElementById("heroBadge").style.background=mn.a;
  // Cards
  var html="";
  for(var i=0;i<mn.t.length;i++){var t=mn.t[i],op=openState[cur+"-"+i],items="";for(var j=0;j<t.i.length;j++)items+='<div class="item"><div class="bullet" style="background:'+t.c+'"></div><p>'+t.i[j]+'</p></div>';html+='<div class="card"><button class="cardHead" style="background:'+mn.bg+'" onclick="toggleCard('+i+')"><span class="tag" style="background:'+t.c+'">'+t.tg+'</span><span class="cardTitle">'+t.h+'</span><span class="arrow" id="ar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span></button><div class="cardBody" id="bd'+i+'" style="display:'+(op?"block":"none")+'">'+items+'</div></div>';}
  document.getElementById("cards").innerHTML=html;
  // Nav
  var pb=document.getElementById("pBtn"),nb=document.getElementById("nBtn"),pl=document.getElementById("prevLbl"),nl=document.getElementById("nextLbl");
  pb.disabled=cur===0;nb.disabled=cur===ms.length-1;
  pl.textContent=cur>0?ms[cur-1].e+" "+ms[cur-1].m:d.prev;
  nl.textContent=cur<ms.length-1?ms[cur+1].e+" "+ms[cur+1].m:d.next;
  document.getElementById("pg").textContent=(cur+1)+" / "+ms.length;
}

function renderModules(){
  var mods=data[lang].modules;
  var html="";
  for(var i=0;i<mods.length;i++){
    var m=mods[i],op=modOpen[i];
    var items="";
    for(var j=0;j<m.subs.length;j++)items+='<li><span class="subDot" style="background:'+m.color+'"></span>'+m.subs[j]+'</li>';
    html+='<div class="modSection">';
    html+='<button class="modHeader" style="background:#f9f9f9" onclick="toggleMod('+i+')">';
    html+='<div class="modNum" style="background:'+m.color+'">'+m.num+'</div>';
    html+='<span class="modTitle">'+m.title+'</span>';
    html+='<span class="arrow" id="mar'+i+'">'+(op?"&#9650;":"&#9660;")+'</span>';
    html+='</button>';
    html+='<div class="modBody" id="mbd'+i+'" style="display:'+(op?"block":"none")+'"><ul class="subList">'+items+'</ul></div>';
    html+='</div>';
  }
  document.getElementById("moduleRef").innerHTML=html;
}

renderAll();
</script>
