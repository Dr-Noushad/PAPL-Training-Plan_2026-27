<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#071a07;color:#222;overflow-x:hidden;}
#hdr{background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 50%,#1b4332 100%);padding:14px 12px 12px;text-align:center;border-bottom:3px solid #52b788;position:relative;}
#hdr::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;background:linear-gradient(90deg,#7dc142,#52b788,#2d6a4f,#7dc142);background-size:200%;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
#hdr h1{color:#7dc142;font-size:18px;font-weight:900;}
#hdr p{color:#b7e4c7;font-size:10px;letter-spacing:2px;margin-top:2px;}
#hdr h2{color:#fff;font-size:14px;margin:6px 0 2px;font-weight:700;}
#hdr small{color:#95d5b2;font-size:10px;}
/* TOP BAR */
#topBar{background:#040f04;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;gap:6px;flex-wrap:wrap;border-bottom:1px solid #1a3a1a;}
.lBtn{padding:6px 14px;border-radius:20px;border:2px solid #52b788;background:transparent;color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;}
.lBtn.on{background:#52b788;color:#040f04;}
.vTabs{display:flex;gap:5px;}
.vTab{padding:6px 12px;border-radius:7px;border:2px solid transparent;background:rgba(255,255,255,.07);color:#95d5b2;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;}
.vTab.on{background:#2e7d32;color:#fff;border-color:#52b788;}
/* QUICK BAR */
#quickBar{background:#071407;padding:8px 10px;border-bottom:2px solid #1a3a1a;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
#quickBar::-webkit-scrollbar{display:none;}
.qTab{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;margin:0 3px;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;text-decoration:none;color:#fff;transition:all .2s;white-space:nowrap;vertical-align:middle;border:none;}
.qTab:hover{opacity:.85;transform:translateY(-1px);}
.qSplit{display:inline-flex;align-items:stretch;margin:0 3px;border-radius:8px;overflow:hidden;vertical-align:middle;}
.qSplitLabel{display:inline-flex;align-items:center;padding:6px 10px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;}
.qSplitDiv{width:1px;background:rgba(255,255,255,.35);}
.qSplitLink{display:inline-flex;align-items:center;padding:6px 10px;font-size:11px;font-weight:bold;color:#fff;text-decoration:none;white-space:nowrap;}
.qSplitLink:hover{background:rgba(255,255,255,.15);}
/* TIMELINE */
#timeline{background:#040f04;padding:10px 10px 6px;border-bottom:2px solid #1a3a1a;overflow-x:auto;scrollbar-width:none;}
#timeline::-webkit-scrollbar{display:none;}
.tlWrap{display:flex;align-items:center;min-width:600px;padding:2px 4px;}
.tlStep{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;cursor:pointer;}
.tlStep:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;right:-50%;height:2px;background:#1a3a1a;z-index:0;}
.tlStep.done:not(:last-child)::after{background:linear-gradient(90deg,#7dc142,#52b788);}
.tlDot{width:28px;height:28px;border-radius:50%;background:#1a3a1a;border:2px solid #2a4a2a;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:1;transition:all .4s;}
.tlStep.done .tlDot{background:linear-gradient(135deg,#2e7d32,#7dc142);border-color:#7dc142;box-shadow:0 0 8px rgba(125,193,66,.6);transform:scale(1.15);}
.tlStep.active .tlDot{background:linear-gradient(135deg,#7dc142,#a5d63f);border-color:#fff;box-shadow:0 0 12px rgba(125,193,66,.9);transform:scale(1.25);animation:pulse .8s ease infinite alternate;}
@keyframes pulse{from{box-shadow:0 0 8px rgba(125,193,66,.6)}to{box-shadow:0 0 18px rgba(125,193,66,1)}}
.tlLabel{font-size:8px;color:#556655;margin-top:3px;text-align:center;line-height:1.2;max-width:44px;transition:color .4s;}
.tlStep.done .tlLabel,.tlStep.active .tlLabel{color:#95d5b2;}
/* MONTH BAR */
#mBar{background:#040f04;padding:8px 6px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;border-bottom:2px solid #1a3a1a;}
#mBar::-webkit-scrollbar{display:none;}
.mBtn{display:inline-block;padding:7px 10px;margin:0 2px;border-radius:8px;border:2px solid transparent;background:rgba(255,255,255,.07);color:#95d5b2;font-size:11px;cursor:pointer;transition:all .25s;white-space:nowrap;}
/* MAIN */
#main{padding:10px;max-width:700px;margin:0 auto;}
/* HERO */
#heroCard{border-radius:14px;overflow:hidden;margin-bottom:10px;position:relative;background:#1a3a1a;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#heroCard.out{animation:slideOutL .32s cubic-bezier(.4,0,.2,1) forwards;}
#heroCard.in{animation:slideInR .35s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes slideOutL{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(-50px) scale(.96)}}
@keyframes slideInR{from{opacity:0;transform:translateX(50px) scale(.96)}to{opacity:1;transform:translateX(0) scale(1)}}
#cottonSVG{width:100%;height:200px;display:block;}
.heroInfo{padding:12px 14px 8px;}
.monthBadge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;margin-bottom:6px;}
.monthTitle{font-size:22px;font-weight:900;color:#fff;line-height:1.1;text-shadow:1px 2px 8px rgba(0,0,0,.7);}
.monthSub{font-size:12px;color:rgba(255,255,255,.82);margin-top:3px;display:block;}
/* ACTIVITY TAGS */
.actBar{display:flex;gap:6px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,.2);}
.actBar::-webkit-scrollbar{display:none;}
.actTag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;flex-shrink:0;}
/* KEY BANNER */
#keyBanner{border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.3);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
/* CARDS */
.card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.cardHead{width:100%;padding:12px;border:none;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;transition:filter .15s;}
.cardHead:active{filter:brightness(.93);}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;color:#fff;font-size:10px;font-weight:bold;white-space:nowrap;flex-shrink:0;}
.cTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.35;}
.arr{font-size:13px;color:#555;flex-shrink:0;margin-left:4px;}
.cBody{display:none;padding:8px 13px 13px;border-top:1px solid #eee;}
.item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;align-items:flex-start;}
.item:last-child{border-bottom:none;}
.dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.item p{margin:0;font-size:13px;color:#333;line-height:1.55;}
/* MODULE VIEW */
#modView{display:none;}
.modCard{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.modHead{width:100%;padding:12px;border:none;background:#f7f7f7;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:Arial,sans-serif;}
.modNum{width:38px;height:38px;border-radius:50%;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modTitle{font-size:13px;font-weight:bold;color:#111;flex:1;line-height:1.3;}
.modBody{display:none;padding:10px 14px 13px;border-top:1px solid #eee;}
.subList{list-style:none;}
.subList li{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px;color:#333;line-height:1.5;align-items:flex-start;}
.subList li:last-child{border-bottom:none;}
.resBtn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:9px 16px;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:8px;font-size:12px;font-weight:bold;text-decoration:none;box-shadow:0 2px 8px rgba(46,125,50,.4);}
/* NAV */
#navRow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.navBtn{flex:1;padding:13px 6px;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;transition:all .2s;background:linear-gradient(135deg,#1b5e20,#2e7d32);}
.navBtn:active{transform:scale(.97);}
.navBtn:disabled{background:#1a2a1a;color:#3a5a3a;}
#pg{text-align:center;font-size:12px;color:#7dc142;white-space:nowrap;font-weight:bold;}
#foot{text-align:center;padding:14px;color:#52b788;font-size:10px;letter-spacing:2px;}
</style>
</head>

    {h:"M3 – Summer Soil Preparation & Land Management",tg:"M3",c:"#4e342e",i:["Training covers: deep summer ploughing, green manure crop sowing (Dhaincha, Sunhemp), field bunding and drainage preparation, soil moisture conservation before monsoon, and biochar use — so farmers prepare a healthy seedbed before the season begins."]},
    {h:"M4 – Organic Input Preparation & Stocking",tg:"M4",c:"#558b2f",i:["Training covers: vermicompost bed setup, compost with decomposers (windrow/pit method), NADEP compost pit, castor cake and NSKE use, Jeevamrut, Ghan Jeevamrut, Panchagavya preparation — so farmers have all organic inputs ready before sowing season.","Farmers will conduct an on-farm input audit to match available stock against requirement, ensuring no gaps during the critical Kharif season."]},
    {h:"Season Planning & Farmer Registration",tg:"Plan",c:"#37474f",i:["Training covers: crop rotation plan for Kharif 2026, village meeting orientation, new farmer onboarding with ICS documentation, demo plot planning, and season farmer registration — so every farmer is enrolled, informed and ready before sowing begins."]},
  ]},
  {m:"June",s:"Kharif Sowing Season",b:"Sowing",e:"🌱",
   acts:[{l:"🌧️ Monsoon Sowing",c:"#2E7D32"},{l:"🌱 Cotton Seeds",c:"#1565C0"},{l:"🌾 Row Sowing",c:"#558B2F"},{l:"🌿 Intercrop",c:"#006064"},{l:"🧪 Seed Process/Beejamrut",c:"#AD1457"},{l:"📋 FFB",c:"#F57F17"}],
   t:[
    {h:"M1 – Introduction to Organic Farming & Cotton",tg:"M1",c:"#2e7d32",i:["Training covers: what organic farming is and how it differs from chemical farming, its history and principles, FYM use and benefits, harmful effects of chemicals, importance of organic cotton in value and market demand, and basic certification concepts — so farmers understand why organic farming is the right choice and their role in it."]},
    {h:"M2 – Cotton & Intercrop Sowing with Beejamrutha",tg:"M2",c:"#1565c0",i:["Training covers: seed rate, spacing, line sowing vs dibbling, moisture condition during sowing, gap filling, intercrop sowing (cotton + redgram/moong) and timing, and Beejamrutha/seed process application — so farmers sow correctly, apply seed treatment in the field, and establish healthy cotton with intercrop from day one."]},
    {h:"M3 – Soil Health & Land Preparation",tg:"M3",c:"#4e342e",i:["Training covers: soil health importance (microorganisms, earthworms, organic matter), land preparation methods (conventional vs minimum tillage), crop residue incorporation, farm bunding, drainage management, and rainwater conservation — so farmers prepare a productive, healthy soil environment."]},
    {h:"M10A – Farm Diary, ICS & FFB Initiation",tg:"M10A",c:"#6a1b9a",i:["Training covers: organic standards basics, ICS overview, farm map and land history documentation, conversion period, buffer zone concept, and how to open and fill the Farmer Field Diary and FFB — recording sowing date, variety, seed source and input purchase details from day one of the season."]},
  ]},
  {m:"July",s:"Kharif Vegetative Stage",b:"Vegetative",e:"🌧️",
   acts:[{l:"🌿 Seedlings",c:"#1565C0"},{l:"🔧 Gap Filling",c:"#558B2F"},{l:"💧 Jeevamrut",c:"#006064"},{l:"🪴 Intercrop Care",c:"#2E7D32"},{l:"🧪 Beejamrut",c:"#AD1457"},{l:"📋 FFB",c:"#F57F17"}],
   t:[
    {h:"M4 – Nutrient Management & Organic Input Application",tg:"M4",c:"#558b2f",i:["Training covers: FYM quality and field application, vermicompost use, Jeevamrut soil drench with Kanda Pani (dosage and timing), NADEP compost application, and early nutrient deficiency symptom identification — so farmers apply the right organic inputs at the right time and keep crops healthy during the vegetative stage."]},
    {h:"M5 – Intercropping, Biodiversity & Ecological Balance",tg:"M5",c:"#006064",i:["Training covers: cotton-based intercrop management (redgram, moong, cowpea), cover crops, border crops, trap crops setup and monitoring, flower strips for beneficial insects, pollinator conservation, and agroforestry basics — so farmers maintain ecological balance and improve farm biodiversity."]},
    {h:"M6 – Weed Management & Intercultivation",tg:"M6",c:"#ad1457",i:["Training covers: weed identification, manual and mechanical weeding schedule, mulching for weed control, critical weed competition period in cotton, and intercultivation timing and tools — so farmers control weeds effectively without harming the crop or soil health."]},
    {h:"M10A – Farm Diary & FFB: Crop Monitoring Records",tg:"M10A",c:"#6a1b9a",i:["Training covers: recording pest/disease observations, Panch Patti Kadha and other input application log entries (spray details, dose, date), labour entries, irrigation and rain event records, Beejamrut records, and FFB update — so every field activity is documented accurately for ICS compliance."]},
  ]},
  {m:"August",s:"Kharif IPM & Organic Inputs",b:"IPM Stage",e:"🌿",
   acts:[{l:"🐛 IPM Scouting",c:"#AD1457"},{l:"🌿 Jeevamrut",c:"#558B2F"},{l:"🪤 Pheromone Trap",c:"#E65100"},{l:"🌱 Weeding",c:"#2E7D32"},{l:"🔍 Internal Inspection",c:"#6A1B9A"},{l:"✅ Audit-Ready",c:"#283593"},{l:"📋 FFB",c:"#F57F17"}],
   t:[
    {h:"M4 – Organic Foliar & Soil Input Application",tg:"M4",c:"#558b2f",i:["Training covers: Panchagavya preparation and spray, biofertilizers (PSB, Azotobacter, Rhizobium), neem oil and botanical extracts, and cow urine formulations — so farmers apply organic inputs confidently to boost crop growth and resist pest/disease pressure without chemicals."]},
    {h:"M6 – Pest Monitoring, Biocontrol & IPM",tg:"M6",c:"#ad1457",i:["Training covers: major cotton pests and life cycles, pest scouting (10 plants/acre), ETL concept, cultural pest management, bird perches installation, sticky and pheromone trap setup, beneficial insect identification (Chrysoperla, Trichogramma, spiders), conservation of natural enemies, and biocontrol agent release — so farmers manage pests through IPM without chemicals."]},
    {h:"M10A – Internal Inspection, Compliance & FFB Verification",tg:"M10A",c:"#6a1b9a",i:["Training covers: input and harvest record maintenance, prohibited inputs list, residue contamination risk awareness, parallel production rules check, conducting internal inspection, preparing audit-ready documentation, and FFB verification — so the farm is fully compliant and ready for external certification audit at any time."]},
  ]},
  {m:"September",s:"Kharif Flowering Stage",b:"Flowering",e:"🌸",
   acts:[{l:"🌸 Flowering",c:"#E65100"},{l:"🦋 Pest Scout",c:"#AD1457"},{l:"🌿 Foliar Spray",c:"#558B2F"},{l:"📋 ICS Check",c:"#6A1B9A"},{l:"📋 FFB",c:"#F57F17"}],
   t:[
    {h:"M4 – Nutrient & Foliar Management at Flowering",tg:"M4",c:"#558b2f",i:["Training covers: Panchagavya spray timing at flowering, biofertilizer application (PSB, Azotobacter, Rhizobium), nutrient and micronutrient (Boron, Zinc) deficiency identification and organic remedy, and Vermiwash foliar spray — so farmers maintain optimal nutrition from flowering through boll setting using only organic inputs."]},
    {h:"M6 – Botanical Pest Control, Disease Management & Safe Spraying",tg:"M6",c:"#ad1457",i:["Training covers: neem oil and neem leaf extract spray, botanical extract preparation and use, cow urine formulations, HNPV spray (preparation, dosage and timing), disease management (grey mildew, bacterial blight), Trichoderma biocontrol agents, field hygiene practices, spray scheduling, cut-off period, and personal protection — so farmers manage pests and diseases organically with safe, effective spraying practices."]},
    {h:"M10A – ICS Compliance Check & FFB Review",tg:"M10A",c:"#6a1b9a",i:["Training covers: mid-season organic standards review, internal inspection process, farmer responsibilities under ICS, non-compliance identification and corrective action, and FFB check — so all certification records are up to date and the farm is compliant before the critical harvest period."]},
  ]},
  {m:"October",s:"Kharif Boll Development",b:"Boll Stage",e:"🪴",
   acts:[{l:"🟢 Green Bolls",c:"#2E7D32"},{l:"🔍 Monitoring",c:"#1565C0"},{l:"💧 Irrigation",c:"#0277BD"},{l:"📓 Diary Review",c:"#6A1B9A"}],
   t:[
    {h:"M6 – Boll Stage Pest Management",tg:"M6",c:"#ad1457",i:["Training covers: pink and American bollworm organic management, spray scheduling with pre-harvest cut-off period, final bird perch monitoring, and boll damage assessment — so farmers protect developing bolls and stop spraying at the right time to maintain organic integrity before harvest."]},
    {h:"M7 – Water Management & Climate-Smart Farming",tg:"M7",c:"#0277bd",i:["Training covers: critical irrigation stages for boll filling, water-saving techniques (furrow, drip, sprinkler), drought management practices, climate change awareness, and carbon sequestration basics — so farmers ensure adequate water during boll development while building climate resilience."]},
    {h:"M10A – Farm Diary Mid-Season Review by VRP/Agronomist",tg:"M10A",c:"#6a1b9a",i:["Training covers: cross-verification of all diary entries by VRP/Agronomist, correction of incomplete records, input cost calculation, and yield forecasting based on boll count — so every farmer's record is accurate, complete and ready for the approaching harvest and audit."]},
  ]},
  {m:"November",s:"Mature Bolls – Field Inspection",b:"Mature Bolls",e:"⚪",
   acts:[{l:"⚪ Mature Bolls",c:"#283593"},{l:"🌟 1st Pick",c:"#006064"},{l:"🏭 CFC",c:"#E65100"},{l:"🔍 Field Check",c:"#1565C0"},{l:"📦 Pre-Harvest",c:"#558B2F"},{l:"📋 Records",c:"#6A1B9A"}],
   t:[
    {h:"M7 & M8 – Pre-Harvest Preparation, Livestock & Traceability",tg:"M8",c:"#283593",i:["Training covers: boll maturity indicators, field quality assessment, storage area preparation for organic cotton, separate tagging system, transport and traceability planning, 1st pick preparation and CFC coordination, post-harvest cotton stalk planning for livestock nutrient recycling, and pre-harvest field hygiene — so farmers are fully organised for a clean, traceable and quality organic harvest."]},
    {h:"M10A – Pre-Harvest Compliance & Lot ID Setup",tg:"M10A",c:"#6a1b9a",i:["Training covers: pre-harvest diary completion, lot identification system setup, and non-compliance corrective action — so every cotton lot is properly identified, documented and compliant with organic certification requirements before the first pick."]},
  ]},
  {m:"December",s:"First Cotton Picking",b:"First Picking",e:"🌟",
   acts:[{l:"🌟 First Pick",c:"#006064"},{l:"🧺 Organic Bags",c:"#795548"},{l:"✅ Quality Check",c:"#558B2F"},{l:"📦 Lot ID",c:"#283593"}],
   t:[
    {h:"M8 & M9 – Cotton Picking, Quality & Group Coordination",tg:"M8",c:"#283593",i:["Training covers: maturity indicators for picking, clean picking without contamination, use of separate bags for organic cotton, weighment and tagging, first lot identification and records, OPG coordination for collective harvest, lead farmer quality monitoring, community-level quality checks, and collective weighment records — so the first pick is clean, traceable and collectively managed."]},
    {h:"M10A – Harvest Diary & Traceability Records",tg:"M10A",c:"#6a1b9a",i:["Training covers: harvest diary entries, lot-wise quality records, and traceability documentation — so every bag of organic cotton picked has a clear, documented identity from field to CFC."]},
  ]},
  {m:"January",s:"Cotton Harvesting & Bagging",b:"Harvesting",e:"🧺",
   acts:[{l:"🧺 Harvesting",c:"#4527A0"},{l:"🏷️ Lot Tagging",c:"#283593"},{l:"💰 Premium Price",c:"#F57F17"},{l:"📊 Yield Record",c:"#558B2F"}],
   t:[
    {h:"M8 – Continued Harvesting, Baling, Marketing & Farm Economics",tg:"M8",c:"#283593",i:["Training covers: continued cotton harvesting, cotton bale preparation, transport precautions, maintaining organic integrity during transport, quality grading, organic cotton value chain, premium pricing documentation, and collective marketing approach with cost-benefit analysis — so farmers complete the harvest professionally and understand the economic value of their organic cotton."]},
    {h:"M10B/C – Child Labour Awareness & Women Safety during Harvest",tg:"M10BC",c:"#c62828",i:["Training covers: child labour awareness during harvest operations, women's safety in field, equal wages for equal work, and health and safety practices — so every worker on the farm is protected, respected and fairly compensated during the harvest season."]},
  ]},
  {m:"February",s:"Final Picking & Cleaning/Sorting",b:"Final Picking",e:"👥",
   acts:[{l:"👥 Group Sorting",c:"#558B2F"},{l:"🧹 Cleaning",c:"#795548"},{l:"📊 Yield Count",c:"#283593"},{l:"💊 Health Check",c:"#C62828"}],
   t:[
    {h:"Rabi – Rabi Nutrient Boost",tg:"Rabi",c:"#795548",i:["Training covers: compost tea and Jeevamrut drench for Rabi crops, Panchagavya spray for grain filling, and micronutrient management (Zinc, Sulfur) — so farmers apply timely organic nutrition to maximise Rabi crop yield and quality."]},
    {h:"M10D/E/F – Labour Rights, Women Protection & Farm Safety",tg:"M10DE",c:"#e65100",i:["Training covers: avoiding heavy work for pregnant and lactating women, safe work conditions and rest, equal wages for all workers, no bonded or forced labour, first aid awareness, heat stress prevention, and safe storage of farm inputs — so every worker on the farm works safely, fairly and with dignity throughout the season."]},
    {h:"M10A – Farm Diary Compliance Verification & Audit Simulation",tg:"M10A",c:"#6a1b9a",i:["Training covers: verification of all diary entries, internal audit simulation with a checklist, total organic inputs calculation, and farmer self-assessment questionnaire — so farmers are confident and audit-ready with complete, accurate records at season end."]},
  ]},
  {m:"March",s:"Crop Residue Mgmt & Compost Prep",b:"Post-Harvest",e:"♻️",
   acts:[{l:"♻️ Residue Mgmt",c:"#4E342E"},{l:"🪣 Compost Pit",c:"#558B2F"},{l:"🌾 Rabi Harvest",c:"#795548"},{l:"💰 Cost-Benefit",c:"#283593"}],
   t:[
    {h:"Rabi & M8 – Rabi Harvest, Yield Recording & Cost-Benefit Analysis",tg:"M8",c:"#283593",i:["Training covers: harvest maturity indicators for wheat, chickpea and mustard; threshing, cleaning and organic storage; seed saving (selection, drying and storage); avoiding contamination in transport; yield estimation and weighment; closing the Farm Diary with production and sale entries; cost of cultivation vs income calculation; and organic premium documentation for certification."]},
    {h:"M10G/H – Non-Discrimination, Inclusion & Grievance System",tg:"M10GH",c:"#4527a0",i:["Training covers: no caste or gender discrimination on farm, respectful behaviour among all farmers and workers, inclusion of small and marginal farmers, grievance and complaint process for farmers and workers, and safe reporting system with conflict resolution — so every person on the farm is treated fairly."]},
  ]},
  {m:"April",s:"Review Meeting & Next Season Plan",b:"Annual Review",e:"📋",
   acts:[{l:"📋 Annual Review",c:"#F57F17"},{l:"📊 Presentations",c:"#6A1B9A"},{l:"🌱 Next Plan",c:"#2E7D32"},{l:"🏆 Recognition",c:"#E65100"},{l:"📝 Farmer Registration",c:"#C62828"}],
   t:[
    {h:"M10A – Annual Audit, Diary Closure & Farmer Recognition",tg:"M10A",c:"#6a1b9a",i:["Training covers: complete Farm Diary review for correctness and completeness, external audit process and common findings, non-compliance corrective actions, and recognition of best diary-keeping farmers — so the season is closed with full documentation and learnings recorded for the next cycle."]},
    {h:"M9 – Trainer Skills & Session Planning for VRP and Lead Farmers",tg:"M9",c:"#f57f17",i:["Training covers: communication skills using local language, adult learning methods, demonstration techniques, visual training tools for field use, session planning with attendance and reporting, and farmer follow-up with adoption monitoring — so VRPs and Lead Farmers are equipped to deliver effective training sessions independently."]},
    {h:"Season Debrief, Next Year Planning & Farmer Registration",tg:"Review",c:"#546e7a",i:["Training covers: group discussion on what worked and what didn't, documentation of best practices from lead farmers, training gap analysis for next season, soil health card review and recommendations, farmer registration for next season, and pre-planning for May seed selection training — so the next season starts better and stronger."]},
  ]},

hi:{
 calTitle:"🌿 किसान प्रशिक्षण कैलेंडर 2026-27",
 calSub:"10 मॉड्यूल · जैविक कपास · रबी फसलें · फार्म डायरी",
 tabCal:"📅 कैलेंडर",tabMod:"📚 मॉड्यूल",prev:"पिछला",next:"अगला",foot:"जैविक कृषि कार्यक्रम",
 months:[
  {m:"मई",s:"खरीफ-पूर्व / ग्रीष्मकाल योजना",b:"प्री-सीजन",e:"☀️",
   acts:[{l:"🌾 भूमि तैयारी",c:"#E65100"},{l:"🧪 बीज उपचार",c:"#1565C0"},{l:"♻️ कम्पोस्ट",c:"#558B2F"},{l:"👥 ग्राम बैठक",c:"#6A1B9A"},{l:"📝 किसान पंजीकरण",c:"#C62828"}],
   t:[
    {h:"M2 – बीज चयन और जैविक बीज उपचार",tg:"M2",c:"#1565c0",i:["प्रशिक्षण में शामिल: गैर-BT कपास बीज किस्मों का चयन, बीज गुणवत्ता परीक्षण (अंकुरण % और शुद्धता), और स्थानीय बीज संरक्षण — ताकि किसान सही बीज चुनना और सुरक्षित भंडारण करना सीखें।","किसान बीजामृत, ट्राइकोडर्मा, नीम अर्क और गोमूत्र से बीज उपचार करना सीखेंगे — इन प्रथाओं को अपनाने से स्वस्थ अंकुरण और मिट्टीजनित बीमारियों से सुरक्षा सुनिश्चित होती है।"]},
